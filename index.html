<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OMNI</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body{
      margin:0;
      background:black;
      color:white;
      font-family:sans-serif;
    }
  </style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const App = () => {

  const [posts, setPosts] = React.useState([]);
  const [mostrarMenu, setMostrarMenu] = React.useState(false);

  const fileInputRef = React.useRef(null);

  const handleMedia = (e) => {
    const file = e.target.files[0];

    if(file){
      const url = URL.createObjectURL(file);

      setPosts([
        ...posts,
        {
          id: Date.now(),
          media: url,
          tipo: file.type.startsWith("video") ? "video" : "image"
        }
      ]);

      setMostrarMenu(false);
    }
  };

  return (
    <div className="min-h-screen bg-black text-white flex flex-col">

      <div className="flex-1 overflow-y-auto">

        {posts.length === 0 && (
          <div className="h-screen flex items-center justify-center text-zinc-500 text-xl">
            Nenhuma publicação
          </div>
        )}

        {posts.map(post => (
          <div
            key={post.id}
            className="w-full h-screen flex items-center justify-center border-b border-zinc-800 relative"
          >

            {post.tipo === "video" ? (
              <video
                src={post.media}
                controls
                autoPlay
                loop
                className="w-full h-full object-cover"
              />
            ) : (
              <img
                src={post.media}
                className="w-full h-full object-contain"
              />
            )}

          </div>
        ))}

      </div>

      <nav className="fixed bottom-0 left-0 right-0 bg-black border-t border-zinc-800 p-4 flex justify-around">

        <button>🏠</button>

        <button>👥</button>

        <button
          className="bg-white text-black px-4 py-2 rounded-full"
          onClick={() => setMostrarMenu(true)}
        >
          +
        </button>

        <button>💬</button>

        <button>👤</button>

      </nav>

      {mostrarMenu && (
        <div className="fixed inset-0 bg-black flex flex-col justify-center p-6 z-50">

          <button
            className="absolute top-6 right-6 text-3xl"
            onClick={() => setMostrarMenu(false)}
          >
            ×
          </button>

          <button
            className="bg-zinc-800 p-4 rounded mb-4"
            onClick={() => fileInputRef.current.click()}
          >
            Criar Post
          </button>

          <input
            type="file"
            ref={fileInputRef}
            className="hidden"
            onChange={handleMedia}
          />

        </div>
      )}

    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
