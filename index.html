<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orni</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Google Sans', sans-serif; }
        body { height: 100vh; overflow: hidden; background: #000; }
        
        .fundo { position: fixed; width: 100%; height: 100%; z-index: 0; }
        .parte-cima { height: 50%; background: #000; }
        .parte-baixo { height: 50%; background: #fff; }
        
        #ofensiva-topo { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); font-size: 28px; font-weight: bold; color: #4285f4; z-index: 5; opacity: 0; transition: 1s; }
        .ativa #ofensiva-topo { opacity: 1; }

        #container-bola { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }
        /* Bola estilo IA Premium */
        .bola { width: 160px; height: 160px; border-radius: 50%; background: conic-gradient(#4285f4, #34a853, #fbbc05, #ea4335, #4285f4); box-shadow: 0 0 40px rgba(66, 133, 244, 0.3); transition: 0.5s; cursor: pointer; }
        
        .area-interacao { 
            position: fixed; 
            bottom: 24px; 
            width: 92%; 
            max-width: 650px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 10; 
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        input { 
            width: 100%; 
            padding: 18px 24px; 
            border-radius: 20px; 
            border: 1px solid #ddd; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.06); 
            font-size: 16px; 
            outline: none; 
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: #4285f4;
            box-shadow: 0 5px 25px rgba(66, 133, 244, 0.18);
        }
        #historico { 
            color: #202124; 
            background: #fff; 
            padding: 22px; 
            border-radius: 24px; 
            min-height: 100px; 
            max-height: calc(100vh - 350px); /* Garante que nunca transborde do topo da viewport */
            height: auto;
            font-weight: 400; 
            border: 1px solid #eee; 
            overflow-y: auto; 
            line-height: 1.6; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Barra de rolagem estilizada para o histórico */
        #historico::-webkit-scrollbar { width: 6px; }
        #historico::-webkit-scrollbar-track { background: transparent; }
        #historico::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
        #historico::-webkit-scrollbar-thumb:hover { background: #ccc; }
        
        .controles-painel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 6px;
        }
        
        .btn-voz {
            padding: 8px 16px;
            border-radius: 14px;
            font-size: 13px;
            border: 1px solid #e0e0e0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            color: #3c4043;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }
        .btn-voz:hover {
            background: #f1f3f4;
            border-color: #dadce0;
            transform: translateY(-1px);
        }
        .btn-voz.ativo {
            background: #e8f0fe;
            border-color: #d2e3fc;
            color: #1967d2;
        }
        
        /* Estilos adicionais para Markdown aprimorado */
        #historico pre { background: #1e1e1e; color: #f8f8f2; padding: 15px; border-radius: 12px; margin: 12px 0; overflow-x: auto; font-family: 'Courier New', Courier, monospace; font-size: 14px; box-shadow: inset 0 2px 8px rgba(0,0,0,0.3); text-align: left; }
        #historico code { background: #f3f4f6; padding: 3px 6px; border-radius: 6px; font-family: monospace; font-size: 14px; color: #d91438; font-weight: bold; }
        #historico pre code { background: transparent; padding: 0; color: #f8f8f2; font-weight: normal; }
        #historico ul, #historico ol { margin-left: 24px; margin-bottom: 12px; list-style-type: decimal; }
        #historico ul { list-style-type: disc; }
        #historico li { margin-bottom: 6px; }
        #historico blockquote { border-left: 4px solid #4285f4; padding-left: 14px; color: #555; margin: 14px 0; font-style: italic; background: #f8f9fa; padding-top: 6px; padding-bottom: 6px; border-radius: 0 8px 8px 0; }
        #historico a.fonte-link { display: inline-block; margin-right: 8px; margin-top: 6px; font-size: 12px; color: #4285f4; text-decoration: none; background: #e8f0fe; padding: 4px 10px; border-radius: 15px; font-weight: 500; font-family: sans-serif; border: 1px solid rgba(66, 133, 244, 0.15); transition: 0.2s; }
        #historico a.fonte-link:hover { background: #d2e3fc; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="fundo"><div class="parte-cima"></div><div class="parte-baixo"></div></div>
    
    <div id="ofensiva-topo">🔥 Dia 1</div>
    <div id="container-bola"><div class="bola" id="bola-ia"></div></div>
 
    <div class="area-interacao">
        <div id="historico">Orni: Olá! Sou o seu assistente virtual do dia a dia. Como posso te ajudar hoje?</div>
        
        <div class="controles-painel">
            <button type="button" id="toggle-voz" class="btn-voz ativo" onclick="alternarVoz()">
                <span id="voz-icon">🔊</span> <span id="voz-texto">Voz Ativa</span>
            </button>
            <button type="button" id="btn-repetir" class="btn-voz" onclick="repetirFala()" style="border-radius: 14px; font-size: 13px;" title="Repetir fala atual">
                🗣️ Ouvir Novamente
            </button>
        </div>
        
        <input type="text" id="input-usuario" placeholder="Pergunte qualquer coisa ao Orni..." autocomplete="off">
    </div>

    <script>
        const body = document.body;
        const display = document.getElementById('ofensiva-topo');
        const input = document.getElementById("input-usuario");
        const historico = document.getElementById("historico");
        const bola = document.getElementById("bola-ia");
        
        let jaInteragiuHoje = false;
        let chatHistory = [];
        
        // Configurações de voz de Orni
        let vozAtiva = localStorage.getItem('vozAtiva') !== 'false';
        let ultimaRespostaTexto = '';

        function inicializarInterfaceVoz() {
            const btnVoz = document.getElementById('toggle-voz');
            const vozIcon = document.getElementById('voz-icon');
            const vozTexto = document.getElementById('voz-texto');
            if (!btnVoz) return;
            
            if (vozAtiva) {
                btnVoz.classList.add('ativo');
                vozIcon.innerText = '🔊';
                vozTexto.innerText = 'Voz Ativa';
            } else {
                btnVoz.classList.remove('ativo');
                vozIcon.innerText = '🔇';
                vozTexto.innerText = 'Voz Muda';
            }
        }

        function alternarVoz() {
            vozAtiva = !vozAtiva;
            localStorage.setItem('vozAtiva', vozAtiva);
            inicializarInterfaceVoz();
            if (!vozAtiva) {
                window.speechSynthesis.cancel();
            } else if (ultimaRespostaTexto) {
                falarTexto(ultimaRespostaTexto);
            }
        }

        function repetirFala() {
            if (ultimaRespostaTexto) {
                falarTexto(ultimaRespostaTexto, true);
            } else {
                falarTexto("Eu ainda não disse nada para repetir!", true);
            }
        }

        function falarTexto(texto, forcar = false) {
            if (!vozAtiva && !forcar) return;
            
            window.speechSynthesis.cancel();
            
            let textoLimpo = texto
                .replace(/<[^>]*>/g, "")
                .replace(/[\*\_`#\-]/g, "")
                .replace(/💻.*?\n/gs, "")
                .replace(/```[\s\S]*?```/g, "[Bloco de código omitido do áudio]")
                .split("🔍 Fontes de Pesquisa")[0]
                .trim();

            if (!textoLimpo) return;

            if (textoLimpo.length > 550) {
                let pontoCorte = textoLimpo.indexOf('.', 500);
                if (pontoCorte === -1) pontoCorte = 550;
                textoLimpo = textoLimpo.substring(0, pontoCorte + 1) + "..";
            }

            const msg = new SpeechSynthesisUtterance(textoLimpo);
            msg.lang = "pt-BR";
            msg.rate = 1.05;
            
            const voices = window.speechSynthesis.getVoices();
            let voicePt = voices.find(v => v.lang === 'pt-BR' && (v.name.includes('Google') || v.name.includes('Maria') || v.name.includes('Daniela')));
            if (!voicePt) {
                voicePt = voices.find(v => v.lang.startsWith('pt'));
            }
            if (voicePt) {
                msg.voice = voicePt;
            }

            window.speechSynthesis.speak(msg);
        }

        function carregarOfensiva() {
            let dias = parseInt(localStorage.getItem('diasOfensiva')) || 0;
            let ultimaData = localStorage.getItem('ultimaData');
            const hoje = new Date().toDateString();

            if (ultimaData !== hoje) {
                let ontem = new Date();
                ontem.setDate(ontem.getDate() - 1);
                dias = (ultimaData === ontem.toDateString()) ? dias + 1 : 1;
                localStorage.setItem('diasOfensiva', dias);
                localStorage.setItem('ultimaData', hoje);
            }
            display.innerText = "🔥 Dia " + (dias === 0 ? 1 : dias);
        }

        if (window.speechSynthesis) {
            window.speechSynthesis.onvoiceschanged = () => {};
        }
        
        carregarOfensiva();
        inicializarInterfaceVoz();

        function formatarResposta(texto) {
            if (!texto) return "";
            
            let html = texto
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");

            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                const unescapedCode = code
                    .replace(/&amp;/g, "&")
                    .replace(/&lt;/g, "<")
                    .replace(/&gt;/g, ">");
                const safeCode = unescapedCode
                    .replace(/&/g, "&amp;")
                    .replace(/&lt;/g, "<")
                    .replace(/>/g, "&gt;");
                return `<pre><div style="font-size:11px; color:#95c4ff; margin-bottom:6px; font-family:'Google Sans', sans-serif; text-transform:uppercase; font-weight:600; letter-spacing:0.5px;">💻 ${lang || 'código'}</div><code>${safeCode}</code></pre>`;
            });

            html = html.replace(/^&gt;\s*(.+)$/gm, '<blockquote>$1</blockquote>');
            html = html.replace(/^###\s*(.+)$/gm, '<h4 style="margin:12px 0 6px; font-size:16px; font-weight:bold; color:#111;">$1</h4>');
            html = html.replace(/^##\s*(.+)$/gm, '<h3 style="margin:16px 0 6px; font-size:18px; font-weight:bold; color:#111;">$1</h3>');
            html = html.replace(/^#\s*(.+)$/gm, '<h2 style="margin:18px 0 8px; font-size:20px; font-weight:bold; color:#000;">$1</h2>');

            html = html.replace(/^\s*[-*]\s+(.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/g, '<ul>$1</ul>');
            html = html.replace(/<\/ul>\s*<ul>/g, '');

            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            const lines = html.split('\n');
            const processedLines = lines.map(line => {
                const trimmed = line.trim();
                if (trimmed.startsWith('<pre') || trimmed.startsWith('<code') || trimmed.endsWith('</pre>') || trimmed.endsWith('</code>') || trimmed.startsWith('<ul') || trimmed.endsWith('</ul>') || trimmed.startsWith('<li') || trimmed.endsWith('</li>') || trimmed.startsWith('<blockquote') || trimmed.endsWith('</blockquote>')) {
                    return line;
                }
                return line + '<br>';
            });
            html = processedLines.join('');

            return html;
        }

        input.addEventListener("keypress", async (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const pergunta = input.value;
                input.value = "";
                
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                }
                
                if (!jaInteragiuHoje) {
                    body.classList.add('ativa');
                    jaInteragiuHoje = true;
                }

                bola.style.transform = "scale(1.1)";
                setTimeout(() => bola.style.transform = "scale(1)", 500);
                
                historico.innerHTML = "<strong>Orni:</strong> <span style='color: #888;'>Pensando e sintonizando dados...</span>";
                
                let dataLocalOpt = "";
                try {
                    dataLocalOpt = new Date().toLocaleString('pt-BR', { dateStyle: 'full', timeStyle: 'short' });
                } catch (e) {
                    dataLocalOpt = new Date().toString();
                }

                try {
                    const response = await fetch("/api/chat", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            message: pergunta,
                            history: chatHistory,
                            clientDate: dataLocalOpt
                        })
                    });

                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error || "Erro ao consultar o servidor");
                    }

                    const resposta = data.text;
                    ultimaRespostaTexto = resposta;

                    if (resposta && !resposta.includes("sobrecarregado") && !resposta.includes("Limite de Cota") && !resposta.includes("Ocorreu um erro") && !resposta.includes("erro ao conectar")) {
                        chatHistory.push({ role: 'user', text: pergunta });
                        chatHistory.push({ role: 'model', text: resposta });
                    }

                    let respostaFormatada = formatarResposta(resposta);
                    
                    if (data.sources && data.sources.length > 0) {
                        const linksUnicos = [];
                        const urlsVistas = new Set();
                        for (const source of data.sources) {
                            if (source && source.url && !urlsVistas.has(source.url)) {
                                urlsVistas.add(source.url);
                                linksUnicos.push(source);
                            }
                        }
                        
                        if (linksUnicos.length > 0) {
                            respostaFormatada += "<div style='margin-top:15px; border-top:1px solid #eee; padding-top:10px;'><div style='font-size:12px; font-weight:bold; color:#555; margin-bottom:5px; font-family:sans-serif;'>🔍 Fontes de Pesquisa em Tempo Real:</div>";
                            linksUnicos.forEach(source => {
                                respostaFormatada += `<a href="${source.url}" target="_blank" class="fonte-link">${source.title || 'Referência'} ↗</a>`;
                            });
                            respostaFormatada += "</div>";
                        }
                    }
                    
                    historico.innerHTML = "<strong>Orni:</strong> ";
                    let i = 0;
                    function digitar() {
                        if (i < respostaFormatada.length) {
                            if (respostaFormatada.charAt(i) === '<') {
                                let tagEnd = respostaFormatada.indexOf('>', i);
                                if (tagEnd !== -1) {
                                    historico.innerHTML += respostaFormatada.substring(i, tagEnd + 1);
                                    i = tagEnd + 1;
                                } else {
                                    historico.innerHTML += respostaFormatada.charAt(i);
                                    i++;
                                }
                            } else {
                                historico.innerHTML += respostaFormatada.charAt(i);
                                i++;
                            }
                            historico.scrollTop = historico.scrollHeight;
                            setTimeout(digitar, 4);
                        } else {
                            historico.scrollTop = historico.scrollHeight;
                        }
                    }
                    digitar();
                    
                    falarTexto(resposta);

                } catch (err) {
                    console.error(err);
                    const errorMsg = "Desculpe, ocorreu uma pequena oscilação no meu processamento agora. Mas já estou pronta de novo! Pode me perguntar novamente, vou adorar responder você!";
                    historico.innerHTML = "<strong>Orni:</strong> " + errorMsg;
                    falarTexto(errorMsg, true);
                }
            }
        });
    </script>
</body>
</html>
