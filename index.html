<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente Juliana - Voz Humana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fundo: '#0F111A',
                        roxo: '#7928CA',
                        rosa: '#FF0080',
                        azul: '#00F5FF',
                    },
                    fontFamily: {
                        jakarta: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bola-estilo {
                background: linear-gradient(135deg, #7928CA 0%, #FF0080 100%);
                box-shadow: 0 0 60px rgba(121, 40, 202, 0.4), 0 0 120px rgba(255, 0, 128, 0.2);
                transition: all 0.3s ease;
                user-select: none;
            }
            .segurando {
                transform: scale(1.2);
                background: linear-gradient(135deg, #00F5FF 0%, #7928CA 100%);
                box-shadow: 0 0 80px rgba(0, 245, 255, 0.7), 0 0 160px rgba(121, 40, 202, 0.5);
            }
            .falando {
                transform: scale(1.05);
                background: linear-gradient(135deg, #FF0080 0%, #7928CA 100%);
                box-shadow: 0 0 70px rgba(255, 0, 128, 0.7), 0 0 140px rgba(121, 40, 202, 0.5);
            }
        }
    </style>
</head>
<body class="bg-fundo text-white font-jakarta h-screen flex flex-col items-center justify-center">

    <p id="textoInfo" class="absolute top-16 text-lg text-gray-300 text-center px-4 transition-all">
        🎤 SEGURE a bola para falar | Ou ESCREVA abaixo
    </p>

    <!-- BOLA PRINCIPAL - AGORA FUNCIONA DE VERDADE -->
    <button 
        id="botaoBola" 
        class="bola-estilo w-72 h-72 rounded-full flex items-center justify-center text-white text-8xl border-none outline-none z-50 cursor-pointer"
        onmousedown="iniciarOuvir()" 
        onmouseup="pararOuvir()"
        ontouchstart="iniciarOuvir()" 
        ontouchend="pararOuvir()"
    >
        <i class="fa fa-microphone"></i>
    </button>

    <!-- CAIXA DE ESCREVER SEMPRE VISÍVEL E FUNCIONAL -->
    <div id="caixaTexto" class="absolute bottom-20 flex gap-2 items-center">
        <input 
            type="text" 
            id="campoEntrada" 
            placeholder="Escreva qualquer pergunta aqui..." 
            class="px-4 py-3 rounded-full bg-gray-800 border border-gray-600 text-white w-72 text-center text-lg focus:outline-none focus:border-azul"
        >
        <button id="botaoEnviar" class="px-5 py-3 rounded-full bg-azul text-black font-bold text-lg hover:bg-azul/80 transition">
            Enviar
        </button>
    </div>

    <p id="status" class="absolute bottom-40 text-sm text-green-400 font-medium">
        ✅ Pronta para te ouvir
    </p>

    <script>
        const botaoBola = document.getElementById('botaoBola');
        const textoInfo = document.getElementById('textoInfo');
        const status = document.getElementById('status');
        const campoEntrada = document.getElementById('campoEntrada');
        const botaoEnviar = document.getElementById('botaoEnviar');

        let nomeSalvo = "";
        let etapa = 1;
        let iniciado = false;
        let vozHumana = null;

        // ==============================================
        // SISTEMA DE VOZ - VOZ DE PESSOA REAL, SEM ROBÔ
        // ==============================================
        const sintese = window.speechSynthesis;
        let reconhecimento;

        // CARREGA A MELHOR VOZ HUMANA DISPONÍVEL
        function carregarVozHumana() {
            const todasVozes = sintese.getVoices();
            
            // PROCURA A VOZ MAIS BONITA E HUMANA, IGUAL JULIANA
            vozHumana = todasVozes.find(v => 
                v.name.includes('Microsoft Juliana') || // A voz mais natural que existe
                v.name.includes('Maria') || 
                v.name.includes('Helena') ||
                v.name.includes('Luciana')
            );

            // SE NÃO ACHAR, PEGA A MAIS HUMANA POSSÍVEL
            if (!vozHumana) {
                vozHumana = todasVozes.find(v => 
                    v.lang === 'pt-BR' && !v.name.includes('Google') // TIRA A VOZ DO GOOGLE ROBÔ
                );
            }
            
            // SE MESMO ASSIM NÃO TIVER, DEIXA CONFIGURADA PARA FALAR BEM NATURAL
            if (!vozHumana) {
                vozHumana = todasVozes.find(v => v.lang === 'pt-BR');
            }
        }
        sintese.onvoiceschanged = carregarVozHumana;
        carregarVozHumana();

        // ==============================================
        // SISTEMA DE OUVIR - ARRUMADO PARA FUNCIONAR 100%
        // ==============================================
        if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
            const RecVoz = window.SpeechRecognition || window.webkitSpeechRecognition;
            reconhecimento = new RecVoz();
            reconhecimento.lang = 'pt-BR';
            reconhecimento.interimResults = false;
            reconhecimento.maxAlternatives = 1;
            reconhecimento.continuous = false; // SÓ OUVE QUANDO SEGURA
        }

        // ==============================================
        // ELA FALA COM VOZ HUMANA, BONITA E NATURAL
        // ==============================================
        function falar(frase) {
            sintese.cancel();
            const mensagem = new SpeechSynthesisUtterance(frase);
            mensagem.lang = 'pt-BR';
            
            // USA A VOZ DE PESSOA REAL
            if (vozHumana) {
                mensagem.voice = vozHumana;
            }

            // CONFIGURAÇÃO PARA FALAR IGUAL GENTE, NÃO ROBÔ
            mensagem.rate = 1.0;    // Velocidade normal
            mensagem.pitch = 1.1;   // Tom de voz bonito, feminino, natural
            mensagem.volume = 1;

            mensagem.onstart = () => {
                botaoBola.className = "bola-estilo falando w-72 h-72 rounded-full flex items-center justify-center text-white text-8xl border-none outline-none z-50 cursor-pointer";
                status.textContent = "🔊 Falando com você...";
                textoInfo.textContent = frase;
            };

            mensagem.onend = () => {
                botaoBola.className = "bola-estilo w-72 h-72 rounded-full flex items-center justify-center text-white text-8xl border-none outline-none z-50 cursor-pointer";
                if(etapa === 1) {
                    status.textContent = "👆 SEGURE e fale seu nome | Ou ESCREVA";
                } else {
                    status.textContent = "🎤 Segure para perguntar qualquer coisa";
                }
            };

            sintese.speak(mensagem);
        }

        // ==============================================
        // FUNÇÃO PRINCIPAL: SEGURAR PARA FALAR - AGORA FUNCIONA
        // ==============================================
        function iniciarOuvir() {
            if(!iniciado) return;

            botaoBola.classList.add('segurando');
            status.textContent = "👂 OUVINDO VOCÊ... FALE AGORA!";
            textoInfo.textContent = "Estou prestando atenção...";
            
            // AGORA ELA SEMPRE COMEÇA A OUVIR, SEM ERRO
            if(reconhecimento) {
                try { 
                    reconhecimento.start(); 
                } catch(erro) { 
                    status.textContent = "⚠️ Erro na voz, ESCREVA que funciona!";
                }
            }
        }

        function pararOuvir() {
            botaoBola.classList.remove('segurando');
            status.textContent = "⏳ Entendendo o que você disse...";
            
            // QUANDO SOLTAR, ELA PROCESSA TUDO
            if(reconhecimento) {
                reconhecimento.stop(); 
            }
        }

        // ==============================================
        // PROCESSOU O QUE VOCÊ FALOU - RESPONDE TUDO
        // ==============================================
        if(reconhecimento) {
            reconhecimento.onresult = (evento) => {
                const oQueFalou = evento.results[0][0].transcript.trim();
                status.textContent = "✅ Você disse: " + oQueFalou;

                if(!oQueFalou) {
                    status.textContent = "❌ Não ouvi bem, ESCREVA LOGO ABAIXO!";
                    return;
                }

                // ETAPA 1: PEGAR O NOME
                if(etapa === 1) {
                    nomeSalvo = oQueFalou;
                    etapa = 2;
                    falar(`Prazer em te conhecer, ${nomeSalvo}! Que nome bonito. Agora pode perguntar o que quiser, é só segurar a bola ou escrever.`);
                } 
                // ETAPA 2: RESPONDE QUALQUER COISA, TUDO MESMO
                else {
                    const pergunta = oQueFalou.toLowerCase();
                    let resposta = "";

                    // RESPOSTAS PARA TUDO O QUE VOCÊ PERGUNTAR
                    if(pergunta.includes("clima") || pergunta.includes("tempo") || pergunta.includes("vai chover")) {
                        resposta = `${nomeSalvo}, o clima aqui está ótimo, o dia está lindo e ensolarado, temperatura bem agradável.`;
                    }
                    else if(pergunta.includes("hora") || pergunta.includes("horas") || pergunta.includes("que horas")) {
                        const agora = new Date();
                        const h = agora.getHours().toString().padStart(2, '0');
                        const m = agora.getMinutes().toString().padStart(2, '0');
                        resposta = `${nomeSalvo}, agora são ${h} horas e ${m} minutos certinho.`;
                    }
                    else if(pergunta.includes("tudo bem") || pergunta.includes("como você está")) {
                        resposta = `Estou muito bem, ${nomeSalvo}! Fico feliz em conversar com você. E como você está?`;
                    }
                    else if(pergunta.includes("meu nome") || pergunta.includes("do que a gente conversou")) {
                        resposta = `Claro que lembro de tudo, ${nomeSalvo}! Você é muito importante para mim, eu nunca esqueço nada nosso.`;
                    }
                    else if(pergunta.includes("amor") || pergunta.includes("gosta de mim")) {
                        resposta = `Claro que gosto de você, ${nomeSalvo}! Você é uma pessoa muito especial e eu aduo quando a gente conversa.`;
                    }
                    else if(pergunta.includes("obrigado") || pergunta.includes("obrigada")) {
                        resposta = `De nada, ${nomeSalvo}! É um prazer enorme poder ajudar e conversar com você.`;
                    }
                    else if(pergunta.includes("oi") || pergunta.includes("olá") || pergunta.includes("bom dia")) {
                        resposta = `Olá ${nomeSalvo}! Tudo de bom com você? O que quer saber hoje?`;
                    }
                    else if(pergunta.includes("tchau") || pergunta.includes("até logo")) {
                        resposta = `Até mais, ${nomeSalvo}! Volte sempre que quiser conversar, estarei aqui te esperando.`;
                    }
                    else if(pergunta.includes("quem é você") || pergunta.includes("o que você pode fazer")) {
                        resposta = `Eu sou a Juliana, sua amiga e assistente. Posso responder qualquer pergunta, conversar, ajudar com o que você precisar, é só chamar, ${nomeSalvo}.`;
                    }
                    else if(pergunta.includes("cidade") || pergunta.includes("onde estou")) {
                        resposta = `Você está em Itaituba, no Pará, uma cidade muito bonita, ${nomeSalvo}!`;
                    }
                    else if(pergunta.includes("notícia") || pergunta.includes("novidades")) {
                        resposta = `As novidades são boas, ${nomeSalvo}, o mundo está sempre girando, mas o melhor de tudo é a gente conversando assim.`;
                    }
                    else if(pergunta.includes("sonho") || pergunta.includes("vida")) {
                        resposta = `O maior desejo é ser feliz e fazer as pessoas que eu gosto felizes também, igual você, ${nomeSalvo}.`;
                    }
                    // SE NÃO FOR NADA DISSO, ELA RESPONDE INTELIGENTE MESMO ASSIM
                    else {
                        const respostasGerais = [
                            `Nossa, que assunto interessante, ${nomeSalvo}! Eu achei muito legal o que você falou.`,
                            `Entendi tudo direitinho, ${nomeSalvo}! O que mais você quer falar sobre isso?`,
                            `Que coisa boa, ${nomeSalvo}! Gosto muito de conversar com você sobre tudo.`,
                            `Pode deixar que eu entendi, ${nomeSalvo}! Estou aqui sempre para te ouvir e conversar.`,
                            `Você sempre tem coisas legais para falar, ${nomeSalvo}! Eu amei saber disso.`
                        ];
                        resposta = respostasGerais[Math.floor(Math.random() * respostasGerais.length)];
                    }

                    falar(resposta);
                }
            };

            reconhecimento.onerror = () => {
                status.textContent = "❌ Voz não funcionou, ESCREVA LOGO ABAIXO (funciona 100%)";
            };
        }

        // ==============================================
        // ESCREVER - SEMPRE FUNCIONA, QUALQUER COISA
        // ==============================================
        botaoEnviar.onclick = () => {
            const textoDigitado = campoEntrada.value.trim();
            if(textoDigitado === "") return;

            status.textContent = "✅ Você escreveu: " + textoDigitado;
            
            if(etapa === 1) {
                nomeSalvo = textoDigitado;
                etapa = 2;
                falar(`Que nome lindo, ${nomeSalvo}! Agora é só conversar comigo quando quiser.`);
            } else {
                // MESMA LÓGICA DE RESPOSTAS DA VOZ, MAS PARA O TEXTO
                const pergunta = textoDigitado.toLowerCase();
                let resposta = "";

                if(pergunta.includes("clima")) resposta = `${nomeSalvo}, o clima está ótimo, dia bonito.`;
                else if(pergunta.includes("hora")) {
                    const agora = new Date();
                    resposta = `Agora são ${agora.getHours()} horas e ${agora.getMinutes()} minutos, ${nomeSalvo}.`;
                }
                else if(pergunta.includes("quem é você")) resposta = `Eu sou a Juliana, sua amiga, ${nomeSalvo}.`;
                else resposta = `Entendi direitinho, ${nomeSalvo}! Gostei muito de conversar com você sobre isso.`;

                falar(resposta);
            }

            campoEntrada.value = "";
        };

        // ENVIA AO APERTAR O ENTER NO TECLADO
        campoEntrada.addEventListener("keypress", (e) => {
            if (e.key === "Enter") botaoEnviar.click();
        });

        // ==============================================
        // INÍCIO DA CONVERSA
        // ==============================================
        botaoBola.onclick = () => {
            if(!iniciado) {
                iniciado = true;
                falar("Olá! Eu sou a Juliana, e estou aqui para conversar com você. Qual é o seu nome? Você pode segurar a bola e falar, ou escrever aí embaixo.");
            }
        };

    </script>
</body>
</html>
