```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orni - Inteligência Artificial com Voz e Legenda</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { height: 100vh; overflow: hidden; background: #000; }
        .fundo { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 0; }
        .parte-cima { width: 100%; height: 50%; background: black; }
        .parte-baixo { width: 100%; height: 50%; background: white; }
        .container-orni { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 1; transition: 1s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .bola { width: 140px; height: 140px; border-radius: 50%; margin: 0 auto; background: linear-gradient(to bottom, white 0%, #00ff88 35%, #0099ff 60%, black 100%); box-shadow: 0 0 20px #00ff88, 0 0 40px #0099ff; }
        .container-orni.subir { transform: translate(-50%, -150%); }
        .texto-status { margin-top: 25px; font-size: 20px; font-weight: bold; color: #333; }
        .barra { width: 280px; height: 12px; background: #eee; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .progresso { width: 0%; height: 100%; background: linear-gradient(to right, #00ff88, #0099ff); animation: carregar 5s linear forwards; }
        .area-interacao { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; display: none; z-index: 2; }
        #input-usuario { width: 100%; padding: 15px; font-size: 16px; border: 2px solid #0099ff; border-radius: 12px; background: white; color: black; outline: none; }
        #historico { margin-top: 15px; font-size: 18px; color: #333; text-align: left; background: rgba(255,255,255,0.9); padding: 15px; border-radius: 8px; min-height: 80px; }
        @keyframes carregar { from { width: 0%; } to { width: 100%; } }
        .esconder { display: none !important; }
    </style>
</head>
<body>
    <div class="fundo">
        <div class="parte-cima"></div>
        <div class="parte-baixo"></div>
    </div>
    <div class="container-orni" id="container-orni">
        <div class="bola"></div>
        <div class="texto-status" id="texto-status">Iniciando Orni...</div>
        <div class="barra" id="barra"><div class="progresso"></div></div>
    </div>
    <div class="area-interacao" id="area-interacao">
        <input type="text" id="input-usuario" placeholder="Diga algo para a Orni..." autocomplete="off">
        <div id="historico">Orni: Olá! Estou pronta.</div>
    </div>

    <script>
        const apiKey = ""; 
        const containerOrni = document.getElementById("container-orni");
        const input = document.getElementById("input-usuario");
        const historico = document.getElementById("historico");

        // Função que fala e escreve palavra por palavra
        function falarComLegenda(texto) {
            historico.innerHTML = "<strong>Orni:</strong> ";
            const palavras = texto.split(" ");
            let i = 0;

            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'pt-BR';
            
            // Evento que dispara conforme a voz vai falando
            msg.onboundary = (event) => {
                if (event.name === 'word') {
                    if (i < palavras.length) {
                        historico.innerHTML += palavras[i] + " ";
                        i++;
                    }
                }
            };
            
            window.speechSynthesis.speak(msg);
        }

        setTimeout(() => {
            document.getElementById("texto-status").classList.add("esconder");
            document.getElementById("barra").classList.add("esconder");
            containerOrni.classList.add("subir");
            document.getElementById("area-interacao").style.display = "block";
            input.focus();
        }, 5000);

        async function perguntarOrni(pergunta) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Você é a Orni. Responda de forma curta e direta a: " + pergunta }] }]
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (error) { return "Desculpe, falha na conexão."; }
        }

        input.addEventListener("keypress", async (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const pergunta = input.value;
                input.value = "";
                historico.innerHTML = "<strong>Você:</strong> " + pergunta + "<br><br>";
                
                const resposta = await perguntarOrni(pergunta);
                falarComLegenda(resposta);
            }
        });
    </script>
</body>
</html>
