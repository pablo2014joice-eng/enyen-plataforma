<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juliana IA</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

body{
    margin:0;
    background:#0b1020;
    overflow:hidden;
    font-family:Arial;
}

.fundo{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top,#7c3aed44,transparent 40%),
    radial-gradient(circle at bottom,#00d4ff22,transparent 40%),
    #0b1020;
}

.bola{
    width:250px;
    height:250px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    transition:.25s;
    color:white;
    font-size:85px;
    background:linear-gradient(135deg,#7c3aed,#ff0080);
    box-shadow:
    0 0 50px #7c3aed88,
    0 0 100px #ff008055;
}

.bola:hover{
    transform:scale(1.04);
}

.ouvindo{
    animation:pulse .8s infinite;
    background:linear-gradient(135deg,#00d4ff,#7c3aed);
}

.falando{
    animation:falar .5s infinite alternate;
}

@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.12)}
    100%{transform:scale(1)}
}

@keyframes falar{
    from{transform:scale(1)}
    to{transform:scale(1.06)}
}

input{
    outline:none;
}

</style>
</head>

<body class="text-white flex items-center justify-center min-h-screen">

<div class="fundo"></div>

<div class="relative z-10 flex flex-col items-center gap-5 px-4">

<h1 class="text-5xl font-bold">
    JULIANA IA
</h1>

<p id="texto" class="text-gray-300 text-center max-w-md text-lg">
    Clique na bola para começar
</p>

<button id="bola" class="bola">
    <i class="fa-solid fa-microphone"></i>
</button>

<p id="status" class="text-cyan-300">
    Pronta...
</p>

<div class="flex gap-2 flex-wrap justify-center">

<input
id="entrada"
type="text"
placeholder="Digite qualquer coisa..."
class="bg-gray-900 border border-gray-700 rounded-full px-5 py-3 w-72 text-center"
/>

<button
id="btnEnviar"
class="bg-cyan-400 text-black font-bold px-5 py-3 rounded-full">
Enviar
</button>

</div>

</div>

<script>

const bola = document.getElementById("bola");
const texto = document.getElementById("texto");
const statusTxt = document.getElementById("status");
const entrada = document.getElementById("entrada");
const btnEnviar = document.getElementById("btnEnviar");

let recognition;
let ouvindo = false;
let iniciado = false;
let nome = "";
let voz = null;

const synth = window.speechSynthesis;

function carregarVoz(){

    const vozes = synth.getVoices();

    voz =
        vozes.find(v =>
            v.lang.includes("pt-BR") &&
            v.name.toLowerCase().includes("microsoft")
        )
        ||
        vozes.find(v =>
            v.lang.includes("pt-BR")
        )
        ||
        vozes[0];
}

speechSynthesis.onvoiceschanged = carregarVoz;
carregarVoz();

function falar(frase){

    synth.cancel();

    const msg = new SpeechSynthesisUtterance(frase);

    msg.lang = "pt-BR";

    if(voz){
        msg.voice = voz;
    }

    msg.rate = 1;
    msg.pitch = 1;
    msg.volume = 1;

    msg.onstart = () => {

        bola.classList.add("falando");

        statusTxt.innerText = "Falando...";
    };

    msg.onend = () => {

        bola.classList.remove("falando");

        statusTxt.innerText = "Pronta";
    };

    synth.speak(msg);
}

function iniciarIA(){

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if(!SpeechRecognition){

        statusTxt.innerText =
        "Seu navegador não suporta voz";

        return;
    }

    recognition = new SpeechRecognition();

    recognition.lang = "pt-BR";

    recognition.continuous = false;

    recognition.interimResults = false;

    recognition.maxAlternatives = 1;

    recognition.onstart = () => {

        ouvindo = true;

        bola.classList.add("ouvindo");

        statusTxt.innerText = "Estou ouvindo...";
    };

    recognition.onend = () => {

        ouvindo = false;

        bola.classList.remove("ouvindo");

        statusTxt.innerText = "Pronta";
    };

    recognition.onerror = (e) => {

        ouvindo = false;

        bola.classList.remove("ouvindo");

        if(e.error === "not-allowed"){

            statusTxt.innerText =
            "Permita o microfone no navegador";

        }else{

            statusTxt.innerText =
            "Erro ao ouvir";
        }
    };

    recognition.onresult = (event) => {

        const pergunta =
        event.results[0][0].transcript;

        texto.innerText =
        "Você disse: " + pergunta;

        responder(pergunta);
    };
}

iniciarIA();

function responder(pergunta){

    const p = pergunta.toLowerCase();

    let resposta = "";

    if(nome === ""){

        nome = pergunta;

        resposta =
        `Prazer ${nome}, agora pode conversar comigo sobre qualquer coisa.`;

        falar(resposta);

        return;
    }

    if(
        p.includes("oi") ||
        p.includes("olá")
    ){

        resposta =
        `Oi ${nome}, como você está hoje?`;
    }

    else if(
        p.includes("hora")
    ){

        const agora = new Date();

        resposta =
        `Agora são ${agora.getHours()} horas e ${agora.getMinutes()} minutos.`;
    }

    else if(
        p.includes("clima") ||
        p.includes("tempo")
    ){

        resposta =
        `Hoje o clima parece muito agradável.`;
    }

    else if(
        p.includes("quem é você")
    ){

        resposta =
        `Eu sou a Juliana, sua inteligência artificial com voz humana.`;
    }

    else if(
        p.includes("tchau")
    ){

        resposta =
        `Até mais ${nome}.`;
    }

    else if(
        p.includes("meu nome")
    ){

        resposta =
        `Seu nome é ${nome}.`;
    }

    else if(
        p.includes("tudo bem")
    ){

        resposta =
        `Estou muito bem ${nome}, obrigada por perguntar.`;
    }

    else{

        resposta =
        `Interessante ${nome}, gostei do que você falou.`;
    }

    falar(resposta);
}

function ouvir(){

    if(!recognition) return;

    if(ouvindo) return;

    try{

        recognition.start();

    }catch(e){

        console.log(e);
    }
}

bola.addEventListener("click", () => {

    if(!iniciado){

        iniciado = true;

        falar(
        "Olá, eu sou a Juliana. Primeiro me diga o seu nome."
        );

        texto.innerText =
        "Agora segure a bola e fale.";

        return;
    }

    ouvir();
});

bola.addEventListener("mousedown", () => {

    if(iniciado){

        ouvir();
    }
});

bola.addEventListener("touchstart", () => {

    if(iniciado){

        ouvir();
    }
});

function enviarTexto(){

    const valor = entrada.value.trim();

    if(valor === "") return;

    texto.innerText =
    "Você escreveu: " + valor;

    responder(valor);

    entrada.value = "";
}

btnEnviar.onclick = enviarTexto;

entrada.addEventListener("keypress",(e)=>{

    if(e.key === "Enter"){

        enviarTexto();
    }
});

</script>

</body>
</html>
