<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Juliana IA Ultra Voz</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
    body{
        margin:0;
        background:#0b0f1a;
        overflow:hidden;
        font-family:sans-serif;
    }

    .bg{
        position:fixed;
        inset:0;
        background:
        radial-gradient(circle at top,#7c3aed33,transparent 40%),
        radial-gradient(circle at bottom,#06b6d433,transparent 40%),
        #0b0f1a;
    }

    .bola{
        width:260px;
        height:260px;
        border-radius:50%;
        background:linear-gradient(135deg,#7c3aed,#ff0080);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:90px;
        color:white;
        cursor:pointer;
        transition:0.25s;
        box-shadow:
        0 0 60px #7c3aed66,
        0 0 120px #ff008044;
        border:none;
        position:relative;
        z-index:10;
    }

    .bola:hover{
        transform:scale(1.04);
    }

    .ouvindo{
        animation:pulse .8s infinite;
        background:linear-gradient(135deg,#06b6d4,#7c3aed);
    }

    .falando{
        animation:falar .6s infinite alternate;
    }

    @keyframes pulse{
        0%{transform:scale(1);}
        50%{transform:scale(1.15);}
        100%{transform:scale(1);}
    }

    @keyframes falar{
        from{transform:scale(1);}
        to{transform:scale(1.08);}
    }

    input{
        background:#111827;
        color:white;
        border:1px solid #374151;
        outline:none;
    }

    input:focus{
        border-color:#06b6d4;
    }
</style>
</head>

<body class="flex items-center justify-center min-h-screen text-white">

<div class="bg"></div>

<div class="relative z-10 flex flex-col items-center gap-6 px-4">

    <h1 class="text-4xl font-bold text-center">
        JULIANA IA
    </h1>

    <p id="info" class="text-center text-gray-300 text-lg max-w-md">
        Clique na bola para iniciar
    </p>

    <button id="bola" class="bola">
        <i class="fa-solid fa-microphone"></i>
    </button>

    <p id="status" class="text-cyan-300 text-center">
        Pronta...
    </p>

    <div class="flex gap-2 flex-wrap justify-center">
        <input
            id="input"
            type="text"
            placeholder="Digite aqui..."
            class="px-5 py-3 rounded-full w-72"
        />

        <button
            id="enviar"
            class="bg-cyan-400 text-black font-bold px-5 py-3 rounded-full"
        >
            Enviar
        </button>
    </div>

</div>

<script>

const bola = document.getElementById("bola");
const info = document.getElementById("info");
const statusTxt = document.getElementById("status");
const input = document.getElementById("input");
const enviar = document.getElementById("enviar");

let recognition;
let ouvindo = false;
let iniciado = false;
let nome = "";
let vozSelecionada = null;

const synth = window.speechSynthesis;

function carregarVoz(){

    const vozes = synth.getVoices();

    vozSelecionada =
        vozes.find(v => v.lang.includes("pt-BR") && v.name.includes("Microsoft")) ||
        vozes.find(v => v.lang.includes("pt-BR") && v.name.includes("Google")) ||
        vozes.find(v => v.lang.includes("pt")) ||
        vozes[0];

}

speechSynthesis.onvoiceschanged = carregarVoz;
carregarVoz();

function falar(texto){

    synth.cancel();

    const utter = new SpeechSynthesisUtterance(texto);

    utter.lang = "pt-BR";

    if(vozSelecionada){
        utter.voice = vozSelecionada;
    }

    utter.rate = 1;
    utter.pitch = 1;
    utter.volume = 1;

    utter.onstart = () => {
        bola.classList.add("falando");
        statusTxt.innerText = "Falando...";
    };

    utter.onend = () => {
        bola.classList.remove("falando");
        statusTxt.innerText = "Pronta";
    };

    synth.speak(utter);
}

function iniciarReconhecimento(){

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if(!SpeechRecognition){

        alert("Seu navegador não suporta reconhecimento de voz.");

        return;
    }

    recognition = new SpeechRecognition();

    recognition.lang = "pt-BR";
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {

        ouvindo = true;

        bola.classList.add("ouvindo");

        statusTxt.innerText = "Estou ouvindo...";
    };

    recognition.onend = () => {

        ouvindo = false;

        bola.classList.remove("ouvindo");

        statusTxt.innerText = "Parou de ouvir";
    };

    recognition.onerror = (e) => {

        statusTxt.innerText = "Erro: " + e.error;
    };

    recognition.onresult = (event) => {

        const texto = event.results[0][0].transcript;

        info.innerText = "Você disse: " + texto;

        responder(texto);
    };
}

iniciarReconhecimento();

function responder(texto){

    const frase = texto.toLowerCase();

    let resposta = "";

    if(nome === ""){

        nome = texto;

        resposta = `Prazer ${nome}, agora pode conversar comigo.`;

        falar(resposta);

        return;
    }

    if(frase.includes("oi")){

        resposta = `Oi ${nome}, tudo bem?`;

    }else if(frase.includes("hora")){

        const agora = new Date();

        resposta =
        `Agora são ${agora.getHours()} horas e ${agora.getMinutes()} minutos`;

    }else if(frase.includes("clima")){

        resposta = `Hoje o clima está muito agradável.`;

    }else if(frase.includes("quem é você")){

        resposta =
        `Eu sou a Juliana, sua assistente virtual com voz humana.`;

    }else if(frase.includes("tchau")){

        resposta = `Até mais ${nome}.`;

    }else{

        resposta =
        `Entendi o que você falou ${nome}.`;
    }

    falar(resposta);
}

bola.addEventListener("click", () => {

    if(!iniciado){

        iniciado = true;

        falar("Olá, eu sou a Juliana. Qual é o seu nome?");

        info.innerText =
        "Fale seu nome segurando a bola ou digitando.";

        return;
    }

    if(recognition && !ouvindo){

        try{
            recognition.start();
        }catch(e){}
    }
});

bola.addEventListener("mousedown", () => {

    if(recognition && iniciado){

        try{
            recognition.start();
        }catch(e){}
    }
});

bola.addEventListener("touchstart", () => {

    if(recognition && iniciado){

        try{
            recognition.start();
        }catch(e){}
    }
});

function enviarTexto(){

    const texto = input.value.trim();

    if(texto === "") return;

    info.innerText = "Você escreveu: " + texto;

    responder(texto);

    input.value = "";
}

enviar.onclick = enviarTexto;

input.addEventListener("keypress",(e)=>{

    if(e.key === "Enter"){

        enviarTexto();
    }
});

</script>

</body>
</html>
