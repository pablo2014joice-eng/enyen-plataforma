<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente Voz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fundo: '#0F111A',
                        roxo: '#7928CA',
                        rosa: '#FF0080',
                        azul: '#00F5FF',
                    },
                    fontFamily: {
                        jakarta: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bola-estilo {
                background: linear-gradient(135deg, #7928CA 0%, #FF0080 100%);
                box-shadow: 0 0 60px rgba(121, 40, 202, 0.4), 0 0 120px rgba(255, 0, 128, 0.2);
                transition: all 0.4s ease;
            }
            .ouvindo {
                transform: scale(1.15);
                background: linear-gradient(135deg, #00F5FF 0%, #7928CA 100%);
                box-shadow: 0 0 70px rgba(0, 245, 255, 0.6), 0 0 140px rgba(121, 40, 202, 0.4);
            }
            .falando {
                transform: scale(1.05);
                background: linear-gradient(135deg, #FF0080 0%, #7928CA 100%);
                box-shadow: 0 0 70px rgba(255, 0, 128, 0.7), 0 0 140px rgba(121, 40, 202, 0.5);
            }
        }
    </style>
</head>
<body class="bg-fundo text-white font-jakarta h-screen flex flex-col items-center justify-center">

    <p id="textoInfo" class="absolute top-16 text-lg text-gray-300 text-center px-4">
        Clique na bola para começar
    </p>

    <!-- BOLA PRINCIPAL -->
    <button id="botaoBola" class="bola-estilo w-72 h-72 rounded-full flex items-center justify-center text-white text-8xl border-none outline-none z-50 cursor-pointer">
        <i class="fa fa-microphone"></i>
    </button>

    <!-- CAIXA PARA ESCREVER O NOME (SÓ APARECE QUANDO ELA PERGUNTA) -->
    <div id="caixaEscrever" class="absolute bottom-20 flex gap-2 items-center hidden">
        <input 
            type="text" 
            id="campoNome" 
            placeholder="Ou escreva seu nome aqui..." 
            class="px-4 py-3 rounded-full bg-gray-800 border border-gray-600 text-white w-64 focus:outline-none focus:border-azul"
        >
        <button id="botaoEnviar" class="px-5 py-3 rounded-full bg-azul text-black font-bold hover:bg-azul/80 transition">
            Enviar
        </button>
    </div>

    <p id="status" class="absolute bottom-40 text-sm text-gray-400">
        Aguardando...
    </p>

    <script>
        const botaoBola = document.getElementById('botaoBola');
        const textoInfo = document.getElementById('textoInfo');
        const status = document.getElementById('status');
        const caixaEscrever = document.getElementById('caixaEscrever');
        const campoNome = document.getElementById('campoNome');
        const botaoEnviar = document.getElementById('botaoEnviar');

        let nomeSalvo = "";
        let etapa = 1; // 1 = pedir nome | 2 = conversar
        let iniciado = false;

        // SISTEMA DE VOZ
        const sintese = window.speechSynthesis;
        let reconhecimento;

        // CONFIGURAÇÃO PARA OUVIR
        if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            reconhecimento = new Rec();
            reconhecimento.lang = 'pt-BR';
            reconhecimento.interimResults = false;
            reconhecimento.maxAlternatives = 1;
            reconhecimento.continuous = false;
        }

        // ELA FALA
        function falar(frase) {
            sintese.cancel();
            const fala = new SpeechSynthesisUtterance(frase);
            fala.lang = 'pt-BR';
            fala.rate = 1;
            fala.pitch = 1.2;

            fala.onstart = () => {
                botaoBola.className = "bola-estilo falando w-72 h-72 rounded-full flex items-center justify-center text-white text-8xl border-none outline-none z-50 cursor-pointer";
                status.textContent = "🔊 Falando...";
                textoInfo.textContent = frase;
                if(reconhecimento) reconhecimento.stop();
                caixaEscrever.classList.add('hidden'); // Esconde caixa enquanto ela fala
            };

            fala.onend = () => {
                botaoBola.className = "bola-estilo w-72 h-72 rounded-full flex items-center justify-center text-white text-8xl border-none outline-none z-50 cursor-pointer";
                
                // QUANDO ELA PERGUNTAR O NOME: MOSTRA CAIXA PARA ESCREVER E COMEÇA A OUVIR
                if(etapa === 1) {
                    status.textContent = "👂 FALE SEU NOME OU ESCREVA ABAIXO 👇";
                    textoInfo.textContent = "Escolha como quer me dizer seu nome";
                    caixaEscrever.classList.remove('hidden'); // MOSTRA A CAIXA DE ESCREVER
                    if(reconhecimento) reconhecimento.start(); // COMEÇA A OUVIR TAMBÉM
                } else {
                    status.textContent = `🎧 Sempre ouvindo, ${nomeSalvo}`;
                    caixaEscrever.classList.add('hidden'); // Esconde caixa depois que já sabe o nome
                    if(reconhecimento) reconhecimento.start();
                }
            };

            sintese.speak(fala);
        }

        // === OPÇÃO 1: VOCÊ FALA O NOME E ELA OUVE ===
        if(reconhecimento) {
            reconhecimento.onresult = (event) => {
                botaoBola.classList.remove('ouvindo');
                const oQueFalou = event.results[0][0].transcript.trim();
                
                status.textContent = "✅ Entendi (voz): " + oQueFalou;

                if(!oQueFalou) {
                    textoInfo.textContent = "Não ouvi bem, fale de novo ou escreva...";
                    reconhecimento.start();
                    return;
                }

                salvarNome(oQueFalou);
            };

            reconhecimento.onerror = () => {
                botaoBola.classList.remove('ouvindo');
                textoInfo.textContent = "❌ Não ouvi, escreva seu nome aí embaixo";
            };

            reconhecimento.onspeechstart = () => {
                botaoBola.classList.add('ouvindo');
                status.textContent = "👂 OUVINDO VOCÊ...";
                textoInfo.textContent = "...";
            };

            reconhecimento.onend = () => {
                if(iniciado && etapa === 1) reconhecimento.start();
                else if(iniciado && etapa === 2) reconhecimento.start();
            };
        }

        // === OPÇÃO 2: VOCÊ ESCREVE O NOME E CLICA EM ENVIAR ===
        botaoEnviar.onclick = () => {
            const nomeDigitado = campoNome.value.trim();
            if(nomeDigitado !== "") {
                status.textContent = "✅ Entendi (escrito): " + nomeDigitado;
                salvarNome(nomeDigitado);
                campoNome.value = ""; // Limpa o campo
            } else {
                status.textContent = "⚠️ Escreva algo primeiro...";
            }
        };

        // FUNÇÃO QUE SALVA O NOME (TANTO FALADO QUANTO ESCRITO)
        function salvarNome(nome) {
            nomeSalvo = nome;
            etapa = 2; // Muda para modo conversa
            falar(`Prazer em te conhecer, ${nomeSalvo}! Agora eu nunca mais esqueço o seu nome. Pode falar ou perguntar o que quiser.`);
        }

        // RESPOSTAS DEPOIS QUE SABE O NOME
        if(reconhecimento) {
            const resultadoOriginal = reconhecimento.onresult;
            reconhecimento.onresult = (event) => {
                if(etapa === 2) {
                    const falado = event.results[0][0].transcript.trim();
                    const respostas = [
                        `Entendi tudo, ${nomeSalvo}!`,
                        `Que legal, ${nomeSalvo}!`,
                        `Claro que sim, ${nomeSalvo}!`,
                        `Tudo bem, ${nomeSalvo}!`,
                        `Estou aqui, ${nomeSalvo}!`
                    ];
                    falar(respostas[Math.floor(Math.random() * respostas.length)]);
                } else {
                    resultadoOriginal(event);
                }
            };
        }

        // PRIMEIRO CLIQUE: ELA FALA "QUAL É O SEU NOME?"
        botaoBola.onclick = () => {
            if(!iniciado) {
                iniciado = true;
                falar("Olá! Eu estou aqui. Qual é o seu nome? Você pode falar ou escrever.");
            }
        };

    </script>
</body>
</html>
