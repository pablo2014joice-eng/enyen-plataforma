<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Juliana IA</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

body{
    margin:0;
    background:#0b1020;
    overflow:hidden;
    font-family:Arial;
}

.fundo{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top,#7c3aed44,transparent 40%),
    radial-gradient(circle at bottom,#00d4ff22,transparent 40%),
    #0b1020;
}

.bola{
    width:260px;
    height:260px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    transition:.25s;
    color:white;
    font-size:90px;
    background:linear-gradient(135deg,#7c3aed,#ff0080);
    box-shadow:
    0 0 50px #7c3aed88,
    0 0 100px #ff008055;
}

.bola:hover{
    transform:scale(1.05);
}

.ouvindo{
    animation:pulse .8s infinite;
    background:linear-gradient(135deg,#00d4ff,#7c3aed);
}

.falando{
    animation:falar .5s infinite alternate;
}

@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.12)}
    100%{transform:scale(1)}
}

@keyframes falar{
    from{transform:scale(1)}
    to{transform:scale(1.07)}
}

</style>
</head>

<body class="text-white flex items-center justify-center min-h-screen">

<div class="fundo"></div>

<div class="relative z-10 flex flex-col items-center gap-5 px-4">

<h1 class="text-5xl font-bold">
    JULIANA IA
</h1>

<p id="texto" class="text-gray-300 text-center max-w-md text-lg">
    Clique na bola para começar
</p>

<button id="bola" class="bola">
    <i class="fa-solid fa-microphone"></i>
</button>

<p id="status" class="text-cyan-300">
    Pronta...
</p>

<div class="flex gap-2 flex-wrap justify-center">

<input
id="entrada"
type="text"
placeholder="Pergunte qualquer coisa..."
class="bg-gray-900 border border-gray-700 rounded-full px-5 py-3 w-80 text-center text-white"
/>

<button
id="btnEnviar"
class="bg-cyan-400 text-black font-bold px-5 py-3 rounded-full">
Enviar
</button>

</div>

</div>

<script>

// COLOQUE SUA CHAVE AQUI
const API_KEY = "AIzaSyDnUqQMcyy77rmtgERBw_GdN8KLF3qyC1Q";

const bola = document.getElementById("bola");
const texto = document.getElementById("texto");
const statusTxt = document.getElementById("status");
const entrada = document.getElementById("entrada");
const btnEnviar = document.getElementById("btnEnviar");

let recognition;
let ouvindo = false;
let iniciado = false;
let voz = null;

const synth = window.speechSynthesis;

function carregarVoz(){

    const vozes = synth.getVoices();

    voz =
        vozes.find(v =>
            v.lang.includes("pt-BR") &&
            v.name.toLowerCase().includes("microsoft")
        )
        ||
        vozes.find(v =>
            v.lang.includes("pt-BR")
        )
        ||
        vozes[0];
}

speechSynthesis.onvoiceschanged = carregarVoz;

carregarVoz();

function falar(frase){

    synth.cancel();

    const msg = new SpeechSynthesisUtterance(frase);

    msg.lang = "pt-BR";

    if(voz){
        msg.voice = voz;
    }

    msg.rate = 1;
    msg.pitch = 1;
    msg.volume = 1;

    msg.onstart = ()=>{

        bola.classList.add("falando");

        statusTxt.innerText = "Falando...";
    };

    msg.onend = ()=>{

        bola.classList.remove("falando");

        statusTxt.innerText = "Pronta";
    };

    synth.speak(msg);
}

function iniciarIA(){

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if(!SpeechRecognition){

        statusTxt.innerText =
        "Navegador sem suporte a voz";

        return;
    }

    recognition = new SpeechRecognition();

    recognition.lang = "pt-BR";

    recognition.continuous = false;

    recognition.interimResults = false;

    recognition.maxAlternatives = 1;

    recognition.onstart = ()=>{

        ouvindo = true;

        bola.classList.add("ouvindo");

        statusTxt.innerText = "Estou ouvindo...";
    };

    recognition.onend = ()=>{

        ouvindo = false;

        bola.classList.remove("ouvindo");

        statusTxt.innerText = "Pronta";
    };

    recognition.onerror = (e)=>{

        ouvindo = false;

        bola.classList.remove("ouvindo");

        if(e.error === "not-allowed"){

            statusTxt.innerText =
            "Permita o microfone";

        }else{

            statusTxt.innerText =
            "Erro ao ouvir";
        }
    };

    recognition.onresult = async (event)=>{

        const pergunta =
        event.results[0][0].transcript;

        texto.innerText =
        "Você disse: " + pergunta;

        await responderIA(pergunta);
    };
}

iniciarIA();

async function responderIA(pergunta){

    statusTxt.innerText = "Pensando...";

    try{

        const respostaAPI = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                contents:[
                    {
                        parts:[
                            {
                                text:
`Você é Juliana, uma inteligência artificial feminina, amigável, inteligente e natural.

Converse igual uma pessoa real.

Responda em português brasileiro.

Pergunta:
${pergunta}`
                            }
                        ]
                    }
                ]

            })
        });

        const dados = await respostaAPI.json();

        const resposta =
        dados.candidates[0].content.parts[0].text;

        texto.innerText = resposta;

        falar(resposta);

    }catch(erro){

        console.log(erro);

        statusTxt.innerText =
        "Erro na IA";

        falar("Desculpe, aconteceu um erro.");
    }
}

function ouvir(){

    if(!recognition) return;

    if(ouvindo) return;

    try{

        recognition.abort();

    }catch(e){}

    setTimeout(()=>{

        try{

            recognition.start();

        }catch(e){

            console.log(e);
        }

    },200);
}

bola.addEventListener("click", ()=>{

    if(!iniciado){

        iniciado = true;

        falar(
        "Olá, eu sou a Juliana. Agora pode me perguntar qualquer coisa."
        );

        texto.innerText =
        "Pergunte qualquer coisa.";

        return;
    }

    ouvir();
});

bola.addEventListener("pointerdown", ()=>{

    if(iniciado){

        ouvir();
    }
});

async function enviarTexto(){

    const valor = entrada.value.trim();

    if(valor === "") return;

    texto.innerText =
    "Você escreveu: " + valor;

    entrada.value = "";

    await responderIA(valor);
}

btnEnviar.onclick = enviarTexto;

entrada.addEventListener("AIzaSyDnUqQMcyy77rmtgERBw_GdN8KLF3qyC1Q",(e)=>{

    if(e.key === "Enter"){

        enviarTexto();
    }
});

</script>

</body>
</html>
