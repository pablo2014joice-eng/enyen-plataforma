```html
<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .view-section { display: none; margin-top: 1rem; }
        .view-section.active { display: block; }
        .camera-ui { position: fixed; inset: 0; background: black; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 40px; }
        .camera-ui.active { display: flex; }
        .timer-btn { cursor: pointer; padding: 4px 8px; border-radius: 8px; font-weight: bold; }
        .timer-btn.active { background: rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen p-6 font-sans text-sm">

    <header class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-blue-500">OMNI</h1>
        <div id="userAvatar" class="w-10 h-10 rounded-full bg-slate-800 border border-blue-500"></div>
    </header>

    <main>
        <nav class="flex gap-4 mb-4 border-b border-slate-800 pb-2">
            <button onclick="switchTab('feed')" class="font-bold">Feed</button>
            <button onclick="switchTab('rede')" class="font-bold">Rede</button>
            <button onclick="switchTab('ranking')" class="font-bold">Rank de Grupos</button>
            <button onclick="switchTab('create')" class="font-bold">Criar Grupo</button>
        </nav>

        <div id="feed" class="view-section active">Conteúdo do Feed...</div>

        <div id="rede" class="view-section">
            <div class="relative w-full h-[70vh] bg-black rounded-xl overflow-hidden flex items-end">
                <div class="absolute bottom-4 left-4 right-4 bg-black/60 p-3 rounded-xl flex justify-between items-center z-30 border border-slate-800">
                    <span class="text-xs font-bold">Início</span>
                    <span class="text-xs font-bold">Amigos</span>
                    <button class="bg-white text-black px-5 py-1 rounded-lg font-bold text-lg" onclick="openCamera()">+</button>
                    <span class="text-xs font-bold">Mensagens</span>
                    <span class="text-xs font-bold">Perfil</span>
                </div>
            </div>
        </div>

        <div id="ranking" class="view-section">
            <h2 class="text-xl font-bold mb-4">Rank de Grupos</h2>
            <div id="rankingList" class="space-y-2"></div>
        </div>

        <div id="create" class="view-section">
            <h2 class="text-xl font-bold mb-4">Criar Grupo</h2>
            <input type="text" id="groupName" class="w-full bg-slate-900 p-3 rounded-lg text-sm mb-3 border border-slate-800" placeholder="Nome do grupo...">
            <button onclick="createGroup()" class="bg-green-600 px-6 py-2 rounded-lg font-bold text-sm hover:bg-green-700">Criar Grupo</button>
        </div>
    </main>

    <!-- UI da Câmera -->
    <div id="cameraUI" class="camera-ui">
        <video id="videoPreview" autoplay playsinline class="absolute inset-0 w-full h-full object-cover -z-10"></video>
        <button onclick="closeCamera()" class="absolute top-6 left-6 text-white text-3xl">X</button>

        <div id="timerDisplay" class="text-5xl font-bold mb-8">15s</div>
        <div class="flex gap-4 text-xs font-bold mb-6">
            <span class="timer-btn" onclick="setTimer(600, this)">10 min</span>
            <span class="timer-btn" onclick="setTimer(60, this)">60 s</span>
            <span class="timer-btn active" onclick="setTimer(15, this)">15 s</span>
            <span class="timer-btn" onclick="setTimer(0, this)">FOTO</span>
            <span class="timer-btn" onclick="setTimer(0, this)">TEXTO</span>
        </div>
        <div onclick="startRecording()" id="recordBtn" class="w-20 h-20 rounded-full border-4 border-white flex items-center justify-center cursor-pointer mb-10">
            <div class="w-16 h-16 rounded-full bg-red-600"></div>
        </div>
    </div>

    <script>
        let stream = null;
        let recordingTime = 15;
        let interval = null;

        function switchTab(tabId) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        async function openCamera() {
            document.getElementById('cameraUI').classList.add('active');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
                document.getElementById('videoPreview').srcObject = stream;
            } catch (err) { alert("Câmara bloqueada. Permita o acesso nas definições do browser."); }
        }

        function closeCamera() {
            if(stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
            document.getElementById('cameraUI').classList.remove('active');
            clearInterval(interval);
        }

        function setTimer(seconds, el) {
            recordingTime = seconds;
            document.getElementById('timerDisplay').innerText = seconds > 0 ? seconds + "s" : "--";
            document.querySelectorAll('.timer-btn').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
        }

        function startRecording() {
            if(recordingTime === 0) { alert("Modo captura ativado."); return; }
            let counter = recordingTime;
            document.getElementById('recordBtn').style.pointerEvents = 'none';
            interval = setInterval(() => {
                counter--;
                document.getElementById('timerDisplay').innerText = counter + "s";
                if(counter <= 0) {
                    clearInterval(interval);
                    alert("Gravação concluída!");
                    document.getElementById('recordBtn').style.pointerEvents = 'all';
                    closeCamera();
                }
            }, 1000);
        }

        function createGroup() {
            const name = document.getElementById('groupName').value;
            if(!name.trim()) return;
            document.getElementById('rankingList').innerHTML += `<div class="bg-slate-900 p-3 rounded-lg border border-slate-800 font-bold text-sm">${name} - 0 pontos</div>`;
            document.getElementById('groupName').value = '';
        }
    </script>
</body>
</html>
