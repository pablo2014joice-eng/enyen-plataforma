<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enyen - Comparador de Preços</title>
    <style>
        :root { --primary: #007bff; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .item { background: #fff; padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn-edit { background: #ffc107; width: auto; padding: 5px 10px; font-size: 12px; }
        .btn-del { background: #dc3545; width: auto; padding: 5px 10px; font-size: 12px; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>enyen</h1>
    <p style="text-align:center;">Gerenciar Produtos/Produtores</p>

    <div id="form-container">
        <input type="hidden" id="edit-index">
        <div class="form-group">
            <input type="text" id="nome" placeholder="Nome do Produto/Produtor">
        </div>
        <div class="form-group">
            <input type="number" id="preco" placeholder="Preço (R$)">
        </div>
        <button id="btn-salvar" onclick="salvarProduto()">Adicionar Produto</button>
    </div>

    <div id="lista-produtos" style="margin-top: 20px;"></div>
</div>

<script>
    let produtos = JSON.parse(localStorage.getItem('enyen_prods')) || [];

    function renderizar() {
        const lista = document.getElementById('lista-produtos');
        lista.innerHTML = '';
        produtos.forEach((p, index) => {
            lista.innerHTML += `
                <div class="item">
                    <div>
                        <strong>${p.nome}</strong><br>
                        <span>R$ ${p.preco}</span>
                    </div>
                    <div>
                        <button class="btn-edit" onclick="prepararEdicao(${index})">Editar</button>
                        <button class="btn-del" onclick="remover(${index})">X</button>
                    </div>
                </div>
            `;
        });
        localStorage.setItem('enyen_prods', JSON.stringify(produtos));
    }

    function salvarProduto() {
        const nome = document.getElementById('nome').value;
        const preco = document.getElementById('preco').value;
        const index = document.getElementById('edit-index').value;

        if(!nome || !preco) return alert("Preencha tudo!");

        if(index === "") {
            produtos.push({nome, preco});
        } else {
            produtos[index] = {nome, preco};
            document.getElementById('edit-index').value = "";
            document.getElementById('btn-salvar').innerText = "Adicionar Produto";
        }

        document.getElementById('nome').value = "";
        document.getElementById('preco').value = "";
        renderizar();
    }

    function prepararEdicao(index) {
        document.getElementById('nome').value = produtos[index].nome;
        document.getElementById('preco').value = produtos[index].preco;
        document.getElementById('edit-index').value = index;
        document.getElementById('btn-salvar').innerText = "Salvar Alteração";
        window.scrollTo(0,0);
    }

    function remover(index) {
        if(confirm("Deseja excluir?")) {
            produtos.splice(index, 1);
            renderizar();
        }
    }

    renderizar();
</script>

</body>
</html>
