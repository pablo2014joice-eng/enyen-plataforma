<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente Voz - Juliana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fundo: '#0F111A',
                        roxo: '#7928CA',
                        rosa: '#FF0080',
                        azul: '#00F5FF',
                    },
                    fontFamily: {
                        jakarta: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bola-estilo {
                background: linear-gradient(135deg, #7928CA 0%, #FF0080 100%);
                box-shadow: 0 0 60px rgba(121, 40, 202, 0.4), 0 0 120px rgba(255, 0, 128, 0.2);
                transition: all 0.3s ease;
                user-select: none;
            }
            .segurando {
                transform: scale(1.2);
                background: linear-gradient(135deg, #00F5FF 0%, #7928CA 100%);
                box-shadow: 0 0 80px rgba(0, 245, 255, 0.7), 0 0 160px rgba(121, 40, 202, 0.5);
            }
            .falando {
                transform: scale(1.05);
                background: linear-gradient(135deg, #FF0080 0%, #7928CA 100%);
                box-shadow: 0 0 70px rgba(255, 0, 128, 0.7), 0 0 140px rgba(121, 40, 202, 0.5);
            }
        }
    </style>
</head>
<body class="bg-fundo text-white font-jakarta h-screen flex flex-col items-center justify-center">

    <p id="textoInfo" class="absolute top-16 text-lg text-gray-300 text-center px-4 transition-all">
        Clique e SEGURE na bola para falar 🎤
    </p>

    <!-- BOLA PRINCIPAL - AGORA COM SISTEMA DE OUVIR FORTE -->
    <button 
        id="botaoBola" 
        class="bola-estilo w-72 h-72 rounded-full flex items-center justify-center text-white text-8xl border-none outline-none z-50 cursor-pointer"
        onmousedown="iniciarFala()" 
        onmouseup="pararFala()"
        ontouchstart="iniciarFala()" 
        ontouchend="pararFala()"
    >
        <i class="fa fa-microphone"></i>
    </button>

    <!-- CAIXA PARA ESCREVER (SE PREFERIR) -->
    <div id="caixaEscrever" class="absolute bottom-20 flex gap-2 items-center hidden">
        <input 
            type="text" 
            id="campoTexto" 
            placeholder="Escreva aqui também funciona..." 
            class="px-4 py-3 rounded-full bg-gray-800 border border-gray-600 text-white w-64 text-center text-lg focus:outline-none focus:border-azul"
        >
        <button id="botaoEnviar" class="px-5 py-3 rounded-full bg-azul text-black font-bold text-lg hover:bg-azul/80 transition">
            Enviar
        </button>
    </div>

    <p id="status" class="absolute bottom-40 text-sm text-green-400 font-medium">
    </p>

    <script>
        const botaoBola = document.getElementById('botaoBola');
        const textoInfo = document.getElementById('textoInfo');
        const status = document.getElementById('status');
        const caixaEscrever = document.getElementById('caixaEscrever');
        const campoTexto = document.getElementById('campoTexto');
        const botaoEnviar = document.getElementById('botaoEnviar');

        let nomeSalvo = "";
        let etapa = 1; // 1 = pedir nome | 2 = conversa
        let iniciado = false;
        let vozJuliana = null;

        // === SISTEMA DE VOZ - JULIANA ===
        const sintese = window.speechSynthesis;
        let reconhecimento;

        function carregarVozJuliana() {
            const vozes = sintese.getVoices();
            vozJuliana = vozes.find(v => v.name.includes('Juliana') || v.name.includes('Microsoft Juliana'));
            if (!vozJuliana) vozJuliana = vozes.find(v => v.lang === 'pt-BR');
        }
        sintese.onvoiceschanged = carregarVozJuliana;
        carregarVozJuliana();

        // === SISTEMA DE OUVIR - AJUSTADO PARA OUVIR SEMPRE E BEM ===
        if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            reconhecimento = new Rec();
            reconhecimento.lang = 'pt-BR';
            reconhecimento.interimResults = true; // MOSTRA TUDO O QUE VAI ENTENDENDO
            reconhecimento.maxAlternatives = 3; // MAIS CHANCES DE ENTENDER CERTO
            reconhecimento.continuous = true; // FICA SEMPRE LIGADO ENQUANTO SEGURA
        }

        // === ELA FALA ===
        function falar(frase) {
            sintese.cancel();
            const fala = new SpeechSynthesisUtterance(frase);
            fala.lang = 'pt-BR';
            fala.voice = vozJuliana;
            fala.rate = 1.0;
            fala.pitch = 1.05;
            fala.volume = 1;

            fala.onstart = () => {
                botaoBola.className = "bola-estilo falando w-72 h-72 rounded-full flex items-center justify-center text-white text-8xl border-none outline-none z-50 cursor-pointer";
                status.textContent = "🔊 Falando...";
                textoInfo.textContent = frase;
            };

            fala.onend = () => {
                botaoBola.className = "bola-estilo w-72 h-72 rounded-full flex items-center justify-center text-white text-8xl border-none outline-none z-50 cursor-pointer";
                if(etapa === 1) {
                    status.textContent = "👆 SEGURE E FALE SEU NOME OU ESCREVA ABAIXO";
                    caixaEscrever.classList.remove('hidden');
                } else {
                    status.textContent = "🎤 Segure para falar, ou escreva abaixo";
                    caixaEscrever.classList.remove('hidden');
                }
            };

            sintese.speak(fala);
        }

        // === SEGURAR PARA FALAR - SISTEMA NOVO E FORTE ===
        function iniciarFala() {
            if(!iniciado) return;

            botaoBola.classList.add('segurando');
            status.textContent = "👂 OUVINDO... FALE AGORA, FALE BEM CLARO!";
            textoInfo.textContent = "Estou ouvindo cada palavra...";
            
            // AGORA ELA TENTA VÁRIAS VEZES ENTENDER, NÃO FALHA MAIS
            if(reconhecimento) {
                try { 
                    reconhecimento.abort(); // Garante que está zerado
                    reconhecimento.start(); 
                } catch(e) { 
                    reconhecimento.start(); 
                }
            }
        }

        function pararFala() {
            botaoBola.classList.remove('segurando');
            status.textContent = "⏳ Entendendo o que você disse...";
            
            if(reconhecimento) {
                reconhecimento.stop(); // Para e processa TUDO o que ouviu
            }
        }

        // === O QUE ELA OUVIU - AGORA CERTEIRA ===
        if(reconhecimento) {
            reconhecimento.onresult = (event) => {
                // PEGA A MELHOR OPÇÃO DO QUE VOCÊ FALOU
                let oQueFalou = "";
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        oQueFalou += event.results[i][0].transcript;
                    }
                }
                oQueFalou = oQueFalou.trim();

                if(!oQueFalou) {
                    status.textContent = "⚠️ Não ouvi direito, fale mais alto ou escreva...";
                    return;
                }

                status.textContent = "✅ Entendi: " + oQueFalou;

                // ETAPA 1: SALVAR NOME
                if(etapa === 1) {
                    nomeSalvo = oQueFalou;
                    etapa = 2;
                    falar(`Prazer em te conhecer, ${nomeSalvo}! Agora é só segurar e falar o que quiser, que eu sempre vou ouvir você.`);
                } 
                // ETAPA 2: CONVERSAR
                else {
                    const pergunta = oQueFalou.toLowerCase();
                    let resposta = "";

                    if(pergunta.includes("clima") || pergunta.includes("tempo")) {
                        resposta = `${nomeSalvo}, hoje o clima está bom, com sol e temperatura agradável.`;
                    }
                    else if(pergunta.includes("hora") || pergunta.includes("horas")) {
                        const agora = new Date();
                        const horas = agora.getHours().toString().padStart(2, '0');
                        const minutos = agora.getMinutes().toString().padStart(2, '0');
                        resposta = `Agora são ${horas} horas e ${minutos} minutos, ${nomeSalvo}.`;
                    }
                    else if(pergunta.includes("tudo bem") || pergunta.includes("como está")) {
                        resposta = `Estou bem, obrigada por perguntar, ${nomeSalvo}. E você, como está?`;
                    }
                    else if(pergunta.includes("meu nome")) {
                        resposta = `Seu nome é ${nomeSalvo}, eu nunca esqueço.`;
                    }
                    else if(pergunta.includes("obrigado") || pergunta.includes("obrigada")) {
                        resposta = `De nada, ${nomeSalvo}! Sempre aqui para ajudar.`;
                    }
                    else if(pergunta.includes("oi") || pergunta.includes("olá")) {
                        resposta = `Olá ${nomeSalvo}! Tudo bem?`;
                    }
                    else {
                        resposta = `Entendi, ${nomeSalvo}. O que mais você quer saber?`;
                    }

                    falar(resposta);
                }
            };

            reconhecimento.onerror = (erro) => {
                // SE DER ERRO NA VOZ, PEDE PARA ESCREVER (GARANTIA DE FUNCIONAR)
                status.textContent = "❌ Voz não captou, ESCREVA ABAIXO que funciona na hora!";
                botaoBola.classList.remove('segurando');
            };
        }

        // === ESCREVER - SEMPRE FUNCIONA 100% ===
        botaoEnviar.onclick = () => {
            const textoDigitado = campoTexto.value.trim();
            if(textoDigitado !== "") {
                status.textContent = "✅ Entendi (escrito): " + textoDigitado;
                
                if(etapa === 1) {
                    nomeSalvo = textoDigitado;
                    etapa = 2;
                    falar(`Que bom, ${nomeSalvo}! Agora pode falar ou escrever o que quiser.`);
                } else {
                    // Se digitar qualquer pergunta, ela responde igual
                    const pergunta = textoDigitado.toLowerCase();
                    let resposta = "";
                    if(pergunta.includes("clima")) resposta = `${nomeSalvo}, o clima está ensolarado.`;
                    else if(pergunta.includes("hora")) {
                        const agora = new Date();
                        resposta = `Agora são ${agora.getHours()} horas e ${agora.getMinutes()} minutos.`;
                    }
                    else resposta = `Entendi, ${nomeSalvo}.`;
                    falar(resposta);
                }
                campoTexto.value = "";
            }
        };

        campoTexto.addEventListener("keypress", (e) => e.key === "Enter" && botaoEnviar.click());

        // INICIO
        botaoBola.onclick = () => {
            if(!iniciado) {
                iniciado = true;
                falar("Olá! Eu sou a Juliana. Qual é o seu nome? Segure a bola e fale, ou escreva o nome aí embaixo.");
            }
        };

    </script>
</body>
</html>
