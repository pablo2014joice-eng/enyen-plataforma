```html
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI - Batalhas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab-btn { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="px-6 py-4 bg-neutral-950 border-b border-neutral-900">
        <h1 class="text-2xl font-black text-blue-500 mb-4 cursor-pointer" onclick="showTab('feed')">OMNI</h1>
        <nav class="flex gap-4 text-xs font-bold uppercase text-neutral-400 overflow-x-auto pb-2">
            <button onclick="showTab('feed', this)" class="tab-btn active-tab-btn">Feed</button>
            <button onclick="showTab('rede', this)" class="tab-btn">Rede</button>
            <button onclick="showTab('rank', this)" class="tab-btn">Rank</button>
            <button onclick="showTab('perfil', this)" class="tab-btn">Perfil</button>
        </nav>
    </header>

    <main class="flex-1 overflow-y-auto p-6">
        <div id="feed" class="tab-content active space-y-4">
            <h2 class="font-bold">Batalhas Ativas</h2>
            <div id="lista-batalhas"></div>
            <button onclick="showTab('criar-batalha')" class="w-full bg-blue-600 py-2 rounded-xl text-xs font-bold">+ Criar Batalha</button>
        </div>

        <div id="rede" class="tab-content space-y-4">
            <button onclick="showTab('criar-grupo')" class="w-full py-3 bg-neutral-900 border border-neutral-800 rounded-xl font-bold text-blue-500">+ Criar Grupo</button>
            <div id="lista-grupos" class="space-y-4"></div>
        </div>

        <div id="rank" class="tab-content space-y-4">
            <h2 class="font-bold">Rank Global</h2>
            <div id="lista-rank" class="p-4 bg-neutral-900 rounded-xl"></div>
        </div>

        <div id="perfil" class="tab-content space-y-4 max-w-sm mx-auto">
            <label class="w-24 h-24 bg-neutral-800 rounded-full mx-auto flex items-center justify-center cursor-pointer overflow-hidden border border-neutral-700">
                <img id="p-img" class="hidden w-full h-full object-cover">
                <span id="p-text">Foto</span>
                <input type="file" class="hidden" accept="image/*" onchange="atualizarPerfilImg(this)">
            </label>
            <input type="text" id="meu-nome" oninput="salvarPerfil()" placeholder="Nome" class="w-full bg-neutral-900 p-3 rounded-xl border border-neutral-800">
            <textarea id="minha-bio" oninput="salvarPerfil()" placeholder="Biografia" class="w-full bg-neutral-900 p-3 rounded-xl border border-neutral-800"></textarea>
        </div>

        <div id="criar-grupo" class="tab-content space-y-4 max-w-sm mx-auto">
            <label class="w-24 h-24 bg-neutral-900 rounded-full mx-auto flex items-center justify-center cursor-pointer overflow-hidden border border-neutral-800">
                <img id="g-img" class="hidden w-full h-full object-cover">
                <span id="g-text">Foto</span>
                <input type="file" id="g-input" class="hidden" accept="image/*" onchange="previewImg(this, 'g-img', 'g-text')">
            </label>
            <input type="text" id="g-nome" placeholder="Nome do Grupo" class="w-full bg-neutral-900 p-3 rounded-xl border border-neutral-800">
            <textarea id="g-bio" placeholder="Biografia" class="w-full bg-neutral-900 p-3 rounded-xl border border-neutral-800"></textarea>
            <button onclick="salvarGrupo()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Criar Grupo</button>
        </div>

        <div id="criar-batalha" class="tab-content space-y-4 max-w-sm mx-auto">
            <input type="text" id="tit-bat" placeholder="Título da Batalha" class="w-full bg-neutral-900 p-3 rounded-xl border border-neutral-800">
            <button onclick="salvarBatalha()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Criar Batalha</button>
        </div>

        <div id="detalhe-grupo" class="tab-content space-y-4 max-w-sm mx-auto">
            <div id="grupo-admin-painel" class="hidden bg-neutral-900 p-4 rounded-xl border border-blue-900 space-y-2">
                <h3 class="text-blue-500 font-bold text-xs uppercase">Painel do Dono</h3>
                <input type="text" id="edit-g-nome" class="w-full bg-neutral-800 p-2 rounded">
                <textarea id="edit-g-bio" class="w-full bg-neutral-800 p-2 rounded"></textarea>
                <div class="flex gap-2">
                    <button onclick="atualizarGrupo()" class="bg-blue-600 px-4 py-1 rounded text-xs font-bold">Salvar</button>
                    <button onclick="excluirGrupo()" class="bg-red-900 text-red-500 px-4 py-1 rounded text-xs font-bold">Excluir Grupo</button>
                </div>
            </div>
            <div id="grupo-view-content"></div>
            <div id="grupo-chat" class="h-40 overflow-y-auto bg-neutral-900 p-3 rounded-xl text-sm space-y-2"></div>
            <div class="flex gap-2">
                <input type="text" id="chat-msg" class="flex-1 bg-neutral-800 p-2 rounded" placeholder="Mensagem...">
                <button onclick="enviarMsg()" class="bg-blue-600 px-4 rounded">OK</button>
            </div>
        </div>
    </main>

    <script>
        const MEU_ID = "dono_unico"; 
        let db = JSON.parse(localStorage.getItem('omni_db')) || { grupos: [], batalhas: [], perfil: { nome: '', bio: '', img: '' } };

        function persistir() { localStorage.setItem('omni_db', JSON.stringify(db)); renderizar(); }

        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(btn) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab-btn'));
                btn.classList.add('active-tab-btn');
            }
        }

        function previewImg(input, imgId, textId) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById(imgId).src = e.target.result;
                document.getElementById(imgId).classList.remove('hidden');
                document.getElementById(textId).classList.add('hidden');
            };
            reader.readAsDataURL(input.files[0]);
        }

        function salvarGrupo() {
            db.grupos.push({ id: Date.now(), dono: MEU_ID, nome: document.getElementById('g-nome').value, bio: document.getElementById('g-bio').value, img: document.getElementById('g-img').src, msg: [] });
            persistir();
            showTab('rede');
        }

        function salvarBatalha() {
            db.batalhas.push({ titulo: document.getElementById('tit-bat').value });
            persistir();
            showTab('feed');
        }

        function atualizarGrupo() {
            window.currentG.nome = document.getElementById('edit-g-nome').value;
            window.currentG.bio = document.getElementById('edit-g-bio').value;
            persistir();
            abrirGrupo(window.currentG.id);
        }

        function excluirGrupo() {
            if(confirm("Excluir este grupo permanentemente?")) {
                db.grupos = db.grupos.filter(g => g.id !== window.currentG.id);
                persistir();
                showTab('rede');
            }
        }

        function abrirGrupo(id) {
            window.currentG = db.grupos.find(g => g.id === id);
            const ehDono = window.currentG.dono === MEU_ID;
            
            document.getElementById('grupo-admin-painel').classList.toggle('hidden', !ehDono);
            document.getElementById('edit-g-nome').value = window.currentG.nome;
            document.getElementById('edit-g-bio').value = window.currentG.bio;
            
            document.getElementById('grupo-view-content').innerHTML = `<h2 class="font-bold text-xl">${window.currentG.nome}</h2>`;
            document.getElementById('grupo-chat').innerHTML = window.currentG.msg.map(m => `<div>${m}</div>`).join('');
            showTab('detalhe-grupo');
        }

        function enviarMsg() {
            const m = document.getElementById('chat-msg').value;
            window.currentG.msg.push(m);
            persistir();
            abrirGrupo(window.currentG.id);
            document.getElementById('chat-msg').value = '';
        }

        function renderizar() {
            document.getElementById('lista-grupos').innerHTML = db.grupos.map(g => `<div class="bg-neutral-900 p-4 rounded-xl flex items-center gap-4 cursor-pointer" onclick="abrirGrupo(${g.id})"><img src="${g.img}" class="w-10 h-10 rounded-full object-cover">${g.nome}</div>`).join('');
            document.getElementById('lista-batalhas').innerHTML = db.batalhas.map(b => `<div class="bg-neutral-900 p-4 rounded-xl">${b.titulo}</div>`).join('');
        }
        
        renderizar();
    </script>
</body>
</html>

```
