    <meta property="og:description" content="Digitaliza e Poupa no domínio enyen.com">

    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans">

    <!-- Header enyen.com -->
    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-shopping-bag"></i> enyen
            </h1>
            <span class="text-[10px] font-bold bg-blue-500 px-2 py-1 rounded tracking-widest uppercase">enyen.com</span>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-24">
        <!-- Scanner -->
        <section class="mb-6">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200">
                <div id="reader" class="w-full bg-slate-100 aspect-square"></div>
                <p class="mt-4 text-center text-xs text-slate-400 font-medium">APONTE PARA O CÓDIGO DE BARRAS OU QR</p>
            </div>
        </section>

        <!-- Loading -->
        <div id="loading-state" class="hidden text-center py-8">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-600 border-t-transparent mb-4"></div>
            <p class="text-blue-600 font-black text-sm uppercase">A pesquisar no motor enyen...</p>
        </div>

        <!-- Resultados -->
        <section id="results-section" class="hidden">
            <div id="results-container" class="space-y-4"></div>
        </section>

        <!-- Pesquisa Manual -->
        <div class="mt-6">
            <div class="flex gap-2 p-2 bg-white rounded-2xl border border-slate-200 shadow-sm">
                <input type="text" id="manual-input" placeholder="Nome do produto..." class="flex-1 p-2 bg-transparent focus:outline-none text-sm">
                <button onclick="searchProduct(document.getElementById('manual-input').value)" class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- Navbar -->
    <nav class="fixed bottom-6 left-6 right-6 bg-slate-900/95 backdrop-blur text-white rounded-2xl p-4 shadow-2xl z-50 flex justify-around items-center">
        <button onclick="location.reload()" class="flex flex-col items-center">
            <i class="fas fa-qrcode text-lg text-blue-400"></i>
            <span class="text-[9px] mt-1 font-bold tracking-widest">SCANNER</span>
        </button>
        <div class="w-px h-6 bg-slate-700"></div>
        <button class="flex flex-col items-center opacity-40">
            <i class="fas fa-history text-lg"></i>
            <span class="text-[9px] mt-1 font-bold">HISTÓRICO</span>
        </button>
    </nav>

    <script>
        const apiKey = ""; 
        let html5QrCode;

        window.onload = () => {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
                if (navigator.vibrate) navigator.vibrate(50);
                html5QrCode.pause(); 
                searchProduct(text);
            }).catch(err => console.error(err));
        };

        async function searchProduct(query) {
            if (!query) return;
            document.getElementById('results-section').classList.add('hidden');
            document.getElementById('loading-state').classList.remove('hidden');
            
            try {
                const response = await fetchWithRetry(query);
                renderResults(response);
            } catch (error) {
                alert("Erro ao identificar o produto no enyen.");
            } finally {
                document.getElementById('loading-state').classList.add('hidden');
            }
        }

        async function fetchWithRetry(query, retries = 5) {
            const systemPrompt = "Tu és o motor de busca enyen.com. Identifica produtos e encontra 3 preços em lojas reais (Worten, Amazon.es, Continente, etc). Devolve JSON com domínio para logos.";
            const userQuery = `Produto: ${query}. Retorna JSON: { "produto": "Nome", "comparacao": [{ "loja": "Loja", "preco": "€00.00", "url_loja": "LINK", "dominio": "dominio.com" }] }`;

            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                tools: [{ "google_search": {} }],
                generationConfig: { responseMimeType: "application/json" }
            };

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    return JSON.parse(result.candidates[0].content.parts[0].text);
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(r => setTimeout(r, 1000));
                }
            }
        }

        function renderResults(data) {
            const container = document.getElementById('results-container');
            const section = document.getElementById('results-section');
            container.innerHTML = `
                <div class="bg-blue-600 text-white p-5 rounded-3xl shadow-lg mb-6">
                    <p class="text-[9px] font-black uppercase opacity-80">Identificado pelo enyen</p>
                    <h2 class="text-xl font-black mt-1 leading-tight uppercase italic">${data.produto}</h2>
                </div>
            `;

            data.comparacao.forEach((item, index) => {
                const logoUrl = `https://logo.clearbit.com/${item.dominio}?size=128`;
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex flex-col gap-4";
                card.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-14 h-14 rounded-2xl bg-white border flex items-center justify-center p-2">
                                <img src="${logoUrl}" onerror="this.src='https://ui-avatars.com/api/?name=${item.loja}'" class="store-logo w-full h-full">
                            </div>
                            <p class="font-black text-slate-800 text-sm uppercase">${item.loja}</p>
                        </div>
                        <p class="text-2xl font-black text-blue-600">${item.preco}</p>
                    </div>
                    <a href="${item.url_loja}" target="_blank" class="w-full bg-slate-900 text-white text-center py-4 rounded-2xl font-black text-xs uppercase tracking-widest">
                        Ver Loja Oficial
                    </a>
                `;
                container.appendChild(card);
            });
            section.classList.remove('hidden');
        }
    </script>
</body>
</html>
