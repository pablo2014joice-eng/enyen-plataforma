```html
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI - Batalhas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="px-6 py-4 bg-neutral-950 border-b border-neutral-900 z-20">
        <h1 class="text-2xl font-black text-blue-500 tracking-tight mb-4 cursor-pointer" onclick="showTab('feed')">OMNI</h1>
        <nav class="flex gap-4 text-xs font-semibold text-neutral-400 overflow-x-auto pb-2 items-center">
            <button onclick="showTab('feed')">Feed</button>
            <button onclick="showTab('rede')">Rede</button>
            <button onclick="showTab('rank')">Rank</button>
            <button onclick="showTab('perfil')">Perfil</button>
            <button onclick="showTab('criar-batalha')" class="px-3 py-1 bg-blue-600 rounded-full text-white font-bold">+ Batalha</button>
        </nav>
    </header>

    <main class="flex-1 overflow-y-auto p-6" id="main-content">
        <div id="feed" class="tab-content active"><div id="lista-batalhas" class="space-y-4"></div></div>
        
        <div id="rede" class="tab-content space-y-4">
            <button onclick="showTab('criar-grupo')" class="w-full py-3 bg-neutral-900 border border-neutral-800 rounded-xl font-bold text-blue-500">+ Criar Grupo</button>
            <div id="lista-grupos" class="space-y-4"></div>
        </div>

        <div id="rank" class="tab-content space-y-4">
            <h2 class="font-bold text-lg">Rank Global</h2>
            <div id="lista-rank" class="space-y-2 text-sm text-neutral-400"></div>
        </div>

        <div id="detalhe-grupo" class="tab-content space-y-4 max-w-sm mx-auto">
            <div id="grupo-view-content" class="space-y-4"></div>
            <div id="grupo-chat" class="bg-neutral-900 p-4 rounded-xl h-48 overflow-y-auto space-y-2 border border-neutral-800"></div>
            <div class="flex gap-2">
                <input type="text" id="chat-input" placeholder="Mensagem..." class="flex-1 bg-neutral-800 p-2 rounded">
                <button onclick="enviarMensagem()" class="bg-blue-600 px-4 py-2 rounded">Enviar</button>
            </div>
        </div>

        <div id="criar-grupo" class="tab-content space-y-4 max-w-sm mx-auto">
            <input type="text" id="g-nome" placeholder="Nome do Grupo" class="w-full bg-neutral-900 p-3 rounded-xl border border-neutral-800">
            <textarea id="g-bio" placeholder="Biografia" class="w-full bg-neutral-900 p-3 rounded-xl border border-neutral-800"></textarea>
            <button onclick="criarGrupo()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Criar Grupo</button>
        </div>

        <div id="criar-batalha" class="tab-content space-y-4 max-w-sm mx-auto">
            <input type="text" id="tit-bat" placeholder="Título da Batalha" class="w-full bg-neutral-900 p-3 rounded-xl border border-neutral-800">
            <button onclick="criarBatalha()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Criar Batalha</button>
        </div>
        
        <div id="perfil" class="tab-content">Perfil...</div>
    </main>

    <script>
        let grupos = [];
        let batalhas = [];
        let grupoAtualId = null;

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'rank') atualizarRank();
        }

        function criarGrupo() {
            const nome = document.getElementById('g-nome').value;
            const bio = document.getElementById('g-bio').value;
            if(nome) {
                grupos.push({ id: Date.now(), nome, bio, mensagens: [], dono: true });
                renderizarRede();
                showTab('rede');
            }
        }

        function criarBatalha() {
            const titulo = document.getElementById('tit-bat').value;
            if(titulo) {
                batalhas.push({ titulo });
                document.getElementById('lista-batalhas').innerHTML += `<div class="bg-neutral-900 p-4 rounded-xl border border-neutral-800">${titulo}</div>`;
                showTab('feed');
            }
        }

        function renderizarRede() {
            const lista = document.getElementById('lista-grupos');
            lista.innerHTML = grupos.map(g => `
                <div class="bg-neutral-900 p-4 rounded-xl border border-neutral-800 cursor-pointer" onclick="entrarGrupo(${g.id})">
                    <h3 class="font-bold text-blue-500">${g.nome}</h3>
                </div>
            `).join('');
        }

        function atualizarRank() {
            const lista = document.getElementById('lista-rank');
            lista.innerHTML = `
                <p>Grupos: ${grupos.map(g => g.nome).join(', ')}</p>
                <p>Batalhas: ${batalhas.map(b => b.titulo).join(', ')}</p>
            `;
        }

        function entrarGrupo(id) {
            grupoAtualId = id;
            const g = grupos.find(x => x.id === id);
            document.getElementById('grupo-view-content').innerHTML = `
                <h2 class="text-2xl font-bold">${g.nome}</h2>
                <input type="text" id="e-nome" value="${g.nome}" class="w-full bg-neutral-900 p-2 rounded">
                <textarea id="e-bio" class="w-full bg-neutral-900 p-2 rounded">${g.bio}</textarea>
                <button onclick="salvarGrupo(${g.id})" class="w-full bg-green-600 py-2 rounded">Salvar</button>
                <button onclick="excluirGrupo(${g.id})" class="w-full bg-red-900 text-red-500 py-2 rounded">Excluir</button>
            `;
            showTab('detalhe-grupo');
        }

        function salvarGrupo(id) {
            const g = grupos.find(x => x.id === id);
            g.nome = document.getElementById('e-nome').value;
            g.bio = document.getElementById('e-bio').value;
            renderizarRede();
            showTab('rede');
        }

        function excluirGrupo(id) {
            grupos = grupos.filter(x => x.id !== id);
            renderizarRede();
            showTab('rede');
        }

        function enviarMensagem() {
            const input = document.getElementById('chat-input');
            const g = grupos.find(x => x.id === grupoAtualId);
            if(input.value) {
                g.mensagens.push(input.value);
                document.getElementById('grupo-chat').innerHTML += `<div class="text-sm">${input.value}</div>`;
                input.value = '';
            }
        }
    </script>
</body>
</html>

```
