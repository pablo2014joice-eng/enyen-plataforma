<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente Voz - Juliana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fundo: '#0F111A',
                        roxo: '#7928CA',
                        rosa: '#FF0080',
                        azul: '#00F5FF',
                    },
                    fontFamily: {
                        jakarta: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bola-estilo {
                background: linear-gradient(135deg, #7928CA 0%, #FF0080 100%);
                box-shadow: 0 0 60px rgba(121, 40, 202, 0.4), 0 0 120px rgba(255, 0, 128, 0.2);
                transition: all 0.3s ease;
                user-select: none;
            }
            .segurando {
                transform: scale(1.2);
                background: linear-gradient(135deg, #00F5FF 0%, #7928CA 100%);
                box-shadow: 0 0 80px rgba(0, 245, 255, 0.7), 0 0 160px rgba(121, 40, 202, 0.5);
            }
            .falando {
                transform: scale(1.05);
                background: linear-gradient(135deg, #FF0080 0%, #7928CA 100%);
                box-shadow: 0 0 70px rgba(255, 0, 128, 0.7), 0 0 140px rgba(121, 40, 202, 0.5);
            }
        }
    </style>
</head>
<body class="bg-fundo text-white font-jakarta h-screen flex flex-col items-center justify-center">

    <p id="textoInfo" class="absolute top-16 text-lg text-gray-300 text-center px-4 transition-all">
        Clique e SEGURE na bola para falar 🎤
    </p>

    <!-- BOLA PRINCIPAL - AGORA FUNCIONA 100% AO SEGURAR -->
    <button 
        id="botaoBola" 
        class="bola-estilo w-72 h-72 rounded-full flex items-center justify-center text-white text-8xl border-none outline-none z-50 cursor-pointer"
        onmousedown="iniciarFala()" 
        onmouseup="pararFala()"
        ontouchstart="iniciarFala()" 
        ontouchend="pararFala()"
    >
        <i class="fa fa-microphone"></i>
    </button>

    <!-- CAIXA PARA ESCREVER O NOME -->
    <div id="caixaEscrever" class="absolute bottom-20 flex gap-2 items-center hidden">
        <input 
            type="text" 
            id="campoNome" 
            placeholder="Ou digite seu nome aqui..." 
            class="px-4 py-3 rounded-full bg-gray-800 border border-gray-600 text-white w-64 text-center text-lg focus:outline-none focus:border-azul"
        >
        <button id="botaoEnviar" class="px-5 py-3 rounded-full bg-azul text-black font-bold text-lg hover:bg-azul/80 transition">
            Enviar
        </button>
    </div>

    <p id="status" class="absolute bottom-40 text-sm text-green-400 font-medium">
    </p>

    <script>
        const botaoBola = document.getElementById('botaoBola');
        const textoInfo = document.getElementById('textoInfo');
        const status = document.getElementById('status');
        const caixaEscrever = document.getElementById('caixaEscrever');
        const campoNome = document.getElementById('campoNome');
        const botaoEnviar = document.getElementById('botaoEnviar');

        let nomeSalvo = "";
        let etapa = 1; // 1 = pedir nome | 2 = conversa
        let iniciado = false;
        let vozJuliana = null; // AQUI VAI A VOZ DA JULIANA

        // SISTEMA DE VOZ - VOZ DA JULIANA CONFIGURADA
        const sintese = window.speechSynthesis;
        let reconhecimento;

        // CARREGA E SELECIONA A VOZ DA JULIANA
        function carregarVozJuliana() {
            const vozes = sintese.getVoices();
            
            // PROCURA EXATAMENTE A VOZ DA JULIANA
            vozJuliana = vozes.find(voz => 
                voz.name.includes('Juliana') || 
                voz.name.includes('Microsoft Juliana') || 
                voz.name.includes('PT-BR Juliana') ||
                voz.name === 'Juliana'
            );

            // SE NÃO ACHAR A JULIANA, PEGA A MAIS PARECIDA E BONITA QUE TEM
            if (!vozJuliana) {
                vozJuliana = vozes.find(voz => 
                    voz.lang === 'pt-BR' && 
                    (voz.name.includes('Maria') || voz.name.includes('Helena') || voz.name.includes('Google português'))
                );
            }
            
            console.log("Voz carregada:", vozJuliana ? vozJuliana.name : "Nenhuma");
        }
        sintese.onvoiceschanged = carregarVozJuliana;
        carregarVozJuliana();

        // RECONHECIMENTO DE VOZ - ARRUMADO PARA FUNCIONAR AO SOLTAR
        if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            reconhecimento = new Rec();
            reconhecimento.lang = 'pt-BR';
            reconhecimento.interimResults = false;
            reconhecimento.maxAlternatives = 1;
            reconhecimento.continuous = false; // SÓ OUVE QUANDO SEGURA
        }

        // ELA FALA COM A VOZ DA JULIANA - TOM NORMAL E BONITO
        function falar(frase) {
            sintese.cancel();
            const fala = new SpeechSynthesisUtterance(frase);
            fala.lang = 'pt-BR';
            
            // USA A VOZ DA JULIANA
            if (vozJuliana) {
                fala.voice = vozJuliana;
            }

            // CONFIGURAÇÃO PARA FALAR NORMAL, CLARA E BONITA
            fala.rate = 1.0;    // Velocidade normal
            fala.pitch = 1.05;  // Tom de voz bonito, igual pessoa normal
            fala.volume = 1;

            fala.onstart = () => {
                botaoBola.className = "bola-estilo falando w-72 h-72 rounded-full flex items-center justify-center text-white text-8xl border-none outline-none z-50 cursor-pointer";
                status.textContent = "🔊 Falando...";
                textoInfo.textContent = frase;
                caixaEscrever.classList.add('hidden');
            };

            fala.onend = () => {
                botaoBola.className = "bola-estilo w-72 h-72 rounded-full flex items-center justify-center text-white text-8xl border-none outline-none z-50 cursor-pointer";
                
                if(etapa === 1) {
                    status.textContent = "👆 SEGURE A BOLA E FALE SEU NOME OU ESCREVA ABAIXO";
                    textoInfo.textContent = "Funciona dos dois jeitos";
                    caixaEscrever.classList.remove('hidden');
                } else {
                    status.textContent = "🎤 Segure para falar comigo";
                }
            };

            sintese.speak(fala);
        }

        // === PARTE PRINCIPAL: SEGURAR PARA FALAR - 100% FUNCIONANDO AGORA ===
        function iniciarFala() {
            if(!iniciado) return; // Só funciona depois que começar

            botaoBola.classList.add('segurando');
            status.textContent = "👂 OUVINDO VOCÊ...";
            textoInfo.textContent = "Fale agora, solte quando terminar...";
            
            // COMEÇA A OUVIR ASSIM QUE VOCÊ SEGURA
            if(reconhecimento) {
                try { 
                    reconhecimento.start(); 
                } catch(e) { 
                    console.log("Já estava ouvindo"); 
                }
            }
        }

        function pararFala() {
            // PARA DE OUVIR ASSIM QUE SOLTA E JÁ PROCESSA
            botaoBola.classList.remove('segurando');
            status.textContent = "⏳ Processando o que você disse...";
            
            if(reconhecimento) {
                reconhecimento.stop(); // Esse comando faz ela entender o que foi falado
            }
        }

        // === O QUE VOCÊ FALOU - AGORA ELA SEMPRE RESPONDE ===
        if(reconhecimento) {
            reconhecimento.onresult = (event) => {
                // PEGA O QUE VOCÊ FALOU COM CERTEZA
                const oQueFalou = event.results[0][0].transcript.trim();
                status.textContent = "✅ Você disse: " + oQueFalou;

                if(!oQueFalou) {
                    textoInfo.textContent = "Não entendi bem, segure e fale de novo...";
                    return;
                }

                // ETAPA 1: SALVAR O NOME
                if(etapa === 1) {
                    nomeSalvo = oQueFalou;
                    etapa = 2;
                    falar(`Prazer em te conhecer, ${nomeSalvo}. Agora é só segurar a bola e perguntar qualquer coisa.`);
                } 
                // ETAPA 2: RESPONDE TUDO - RESPOSTAS NORMAIS
                else {
                    const pergunta = oQueFalou.toLowerCase();
                    let resposta = "";

                    if(pergunta.includes("clima") || pergunta.includes("tempo")) {
                        resposta = `${nomeSalvo}, o clima hoje está ensolarado e bem agradável.`;
                    }
                    else if(pergunta.includes("hora") || pergunta.includes("horas")) {
                        const agora = new Date();
                        const horas = agora.getHours().toString().padStart(2, '0');
                        const minutos = agora.getMinutes().toString().padStart(2, '0');
                        resposta = `Agora são ${horas} horas e ${minutos} minutos, ${nomeSalvo}.`;
                    }
                    else if(pergunta.includes("tudo bem") || pergunta.includes("como está")) {
                        resposta = `Estou bem, obrigada por perguntar, ${nomeSalvo}. E você, como está passando o dia?`;
                    }
                    else if(pergunta.includes("meu nome")) {
                        resposta = `Claro que eu lembro, seu nome é ${nomeSalvo}.`;
                    }
                    else if(pergunta.includes("obrigado") || pergunta.includes("obrigada")) {
                        resposta = `De nada, ${nomeSalvo}. É um prazer ajudar.`;
                    }
                    else if(pergunta.includes("oi") || pergunta.includes("olá")) {
                        resposta = `Olá ${nomeSalvo}! Tudo bem com você?`;
                    }
                    else if(pergunta.includes("tchau")) {
                        resposta = `Até mais, ${nomeSalvo}! Quando precisar é só chamar.`;
                    }
                    else {
                        resposta = `Entendi o que você disse, ${nomeSalvo}. O que mais você quer saber?`;
                    }

                    falar(resposta);
                }
            };

            // SE DER ERRO, AVISA PARA TENTAR DE NOVO
            reconhecimento.onerror = (erro) => {
                status.textContent = "❌ Não deu para entender. Tente de novo ou escreva.";
                botaoBola.classList.remove('segurando');
            };
        }

        // === ESCREVER O NOME (OPÇÃO MAIS FÁCIL) ===
        botaoEnviar.onclick = () => {
            const nomeDigitado = campoNome.value.trim();
            if(nomeDigitado !== "") {
                nomeSalvo = nomeDigitado;
                etapa = 2;
                status.textContent = "✅ Nome salvo: " + nomeSalvo;
                campoNome.value = "";
                falar(`Prazer em te conhecer, ${nomeSalvo}. Agora é só segurar e falar comigo.`);
            }
        };

        campoNome.addEventListener("keypress", (e) => e.key === "Enter" && botaoEnviar.click());

        // PRIMEIRA VEZ QUE CLICA
        botaoBola.onclick = () => {
            if(!iniciado) {
                iniciado = true;
                falar("Olá! Tudo bem? Eu sou a Juliana. Qual é o seu nome? Você pode segurar a bola e falar, ou escrever aí embaixo.");
            }
        };

    </script>
</body>
</html>
