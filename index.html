<body>

<div class="header">
    <b style="font-size: 22px;">enyen <small style="background:var(--blue); color:white; padding:2px 5px; border-radius:4px; font-size:10px;">v2.4</small></b>
</div>

<div id="reader-container">
    <div id="reader"></div>
</div>
<div id="status-msg">Aponte para o código de barras no Castanha</div>

<div class="history-section">
    <h3 style="font-weight: 800;">🕒 Histórico em Moraes</h3>
    <div id="history-list"></div>
</div>

<button class="fab-feedback" onclick="openModal('feedback-modal')">
    📢 Relatar Oferta
</button>

<!-- Feedback -->
<div id="feedback-modal" class="modal">
    <h2>Relatar Preço Atualizado</h2>
    <p style="font-size:14px; color:#666;">Envie os preços reais do Supermercado Castanha.</p>
    <input type="text" id="f-city" value="Moraes de Almeida" style="width:100%; padding:15px; margin-top:10px; border-radius:10px; border:1px solid #ccc;">
    <input type="text" id="f-prod" placeholder="Produto">
    <textarea id="f-msg" placeholder="Preço real e observações..." style="width:100%; padding:15px; margin-top:10px; border-radius:10px; border:1px solid #ccc; height:100px;"></textarea>
    <button class="btn-main" onclick="sendRelato()">PUBLICAR NO SISTEMA</button>
    <button class="btn-main" style="background:none; color:grey;" onclick="closeModal('feedback-modal')">Voltar</button>
</div>

<!-- Resultado -->
<div id="result-modal" class="modal">
    <div style="text-align:center;">
        <img id="res-img" src="" style="width:130px; margin-bottom:15px; border-radius:10px;">
        <h2 id="res-name" style="margin:0;">Produto</h2>
        <p id="res-barcode" style="color:grey; font-size:12px; margin-bottom:20px;"></p>
        
        <div id="res-prices" style="text-align:left;"></div>
        
        <button class="btn-main" onclick="closeModal('result-modal')" style="background:var(--primary);">VOLTAR AO SCANNER</button>
    </div>
</div>

<script>
    let html5QrCode;
    
    // TABELA DE PREÇOS REAIS - ATUALIZADA COM R$ 2,99
    const TABELA_PRECOS = {
        "pimenta": 2.99,
        "pão": 1.00,
        "arroz": 28.90,
        "feijão": 8.50,
        "óleo": 6.20,
        "cimento": 45.00
    };

    const PRECO_PADRAO_CASTANHA = 2.99;

    window.onload = () => {
        startScanner();
        renderHistory();
    };

    function startScanner() {
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 15, qrbox: { width: 250, height: 150 } },
            (decodedText) => {
                if(navigator.vibrate) navigator.vibrate(100);
                html5QrCode.pause();
                processProduct(decodedText);
            }
        ).catch(() => {
            document.getElementById('status-msg').innerHTML = "<span style='color:red;'>Erro na câmara. Recarregue a página.</span>";
        });
    }

    async function processProduct(barcode) {
        try {
            const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
            const data = await response.json();
            
            const name = (data.status === 1) ? data.product.product_name : "Produto Moraes " + barcode;
            const img = (data.status === 1) ? data.product.image_url : "https://cdn-icons-png.flaticon.com/512/679/679821.png";
            
            // Lógica de Preço Real do Castanha: R$ 2,99 por padrão ou conforme tabela
            let precoBase = PRECO_PADRAO_CASTANHA; 
            const lowerName = name.toLowerCase();
            
            for (let chave in TABELA_PRECOS) {
                if (lowerName.includes(chave)) {
                    precoBase = TABELA_PRECOS[chave];
                    break;
                }
            }

            document.getElementById('res-name').innerText = name;
            document.getElementById('res-img').src = img;
            document.getElementById('res-barcode').innerText = "Cód: " + barcode;

            const lojas = [
                { nome: "Supermercado Castanha", preco: precoBase.toFixed(2), real: true },
                { nome: "Mercadinho do Povo", preco: (precoBase * 1.1).toFixed(2), real: false },
                { nome: "Vendedor Local", preco: (precoBase * 1.15).toFixed(2), real: false }
            ];

            document.getElementById('res-prices').innerHTML = lojas.map(l => `
                <div class="price-row ${l.real ? 'highlight' : ''}">
                    <div>
                        <b>${l.nome}</b>
                        ${l.real ? '<span class="badge-castanha">PREÇO REAL</span>' : ''}
                    </div>
                    <span style="font-weight:800; color:${l.real ? 'var(--primary)' : '#666'};">R$ ${l.preco}</span>
                </div>
            `).join('');

            saveHistory({ name, img, preco: precoBase.toFixed(2), barcode });
            openModal('result-modal');
        } catch (e) { html5QrCode.resume(); }
    }

    function saveHistory(item) {
        let h = JSON.parse(localStorage.getItem('enyen_h') || '[]');
        h.unshift(item);
        localStorage.setItem('enyen_h', JSON.stringify(h.slice(0, 10)));
        renderHistory();
    }

    function renderHistory() {
        const h = JSON.parse(localStorage.getItem('enyen_h') || '[]');
        document.getElementById('history-list').innerHTML = h.map(i => `
            <div class="card">
                <img src="${i.img}">
                <div>
                    <div style="font-weight:bold; font-size:14px;">${i.name}</div>
                    <div style="color:var(--primary); font-weight:700;">Castanha: R$ ${i.preco}</div>
                </div>
            </div>
        `).join('');
    }

    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { 
        document.getElementById(id).style.display = 'none'; 
        if(id === 'result-modal') html5QrCode.resume();
    }

    function sendRelato() {
        alert("Enviado! O preço será verificado pela equipa enyen.");
        closeModal('feedback-modal');
    }
</script>
</body>
</html>
