<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente Voz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fundo: '#0F111A',
                        roxo: '#7928CA',
                        rosa: '#FF0080',
                        azul: '#00F5FF',
                    },
                    fontFamily: {
                        jakarta: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bola-estilo {
                background: linear-gradient(135deg, #7928CA 0%, #FF0080 100%);
                box-shadow: 0 0 60px rgba(121, 40, 202, 0.4), 0 0 120px rgba(255, 0, 128, 0.2);
                transition: all 0.4s ease;
            }
            .ouvindo {
                transform: scale(1.15);
                background: linear-gradient(135deg, #00F5FF 0%, #7928CA 100%);
                box-shadow: 0 0 70px rgba(0, 245, 255, 0.6), 0 0 140px rgba(121, 40, 202, 0.4);
            }
            .falando {
                transform: scale(1.05);
                background: linear-gradient(135deg, #FF0080 0%, #7928CA 100%);
                box-shadow: 0 0 70px rgba(255, 0, 128, 0.7), 0 0 140px rgba(121, 40, 202, 0.5);
            }
        }
    </style>
</head>
<body class="bg-fundo text-white font-jakarta h-screen flex flex-col items-center justify-center">

    <p id="textoInfo" class="absolute top-20 text-lg text-gray-300">
        Clique na bola para começar
    </p>

    <button id="botaoBola" class="bola-estilo w-72 h-72 rounded-full flex items-center justify-center text-white text-8xl border-none outline-none z-50 cursor-pointer">
        <i class="fa fa-microphone"></i>
    </button>

    <p id="status" class="absolute bottom-20 text-sm text-gray-400">
        Aguardando...
    </p>

    <script>
        const botaoBola = document.getElementById('botaoBola');
        const textoInfo = document.getElementById('textoInfo');
        const status = document.getElementById('status');

        let nomeSalvo = "";
        let etapa = 1; // 1 = pedir nome | 2 = conversar
        let iniciado = false;

        // SISTEMA DE VOZ
        const sintese = window.speechSynthesis;
        let reconhecimento;

        // CONFIGURAÇÃO CERTA PARA OUVIR PORTUGUÊS
        if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            reconhecimento = new Rec();
            reconhecimento.lang = 'pt-BR';
            reconhecimento.interimResults = false; // SÓ PEGA QUANDO VOCÊ TERMINAR DE FALAR
            reconhecimento.maxAlternatives = 1;
            reconhecimento.continuous = false; // AGORA ELA OUVE UMA FRASE POR VEZ, IGUAL GENTE
        }

        // ELA FALA
        function falar(frase) {
            sintese.cancel();
            const fala = new SpeechSynthesisUtterance(frase);
            fala.lang = 'pt-BR';
            fala.rate = 1;
            fala.pitch = 1.2;

            fala.onstart = () => {
                botaoBola.className = "bola-estilo falando w-72 h-72 rounded-full flex items-center justify-center text-white text-8xl border-none outline-none z-50 cursor-pointer";
                status.textContent = "🔊 Falando...";
                textoInfo.textContent = frase;
                if(reconhecimento) reconhecimento.stop();
            };

            fala.onend = () => {
                botaoBola.className = "bola-estilo w-72 h-72 rounded-full flex items-center justify-center text-white text-8xl border-none outline-none z-50 cursor-pointer";
                
                // SE ACABOU DE PERGUNTAR O NOME, AGORA ELA VAI OUVIR VOCÊ FALAR
                if(etapa === 1) {
                    status.textContent = "👂 AGORA FALE SEU NOME...";
                    textoInfo.textContent = "Fale bem alto e claro...";
                    if(reconhecimento) reconhecimento.start(); // COMEÇA A OUVIR AQUI
                } else {
                    status.textContent = `🎧 Sempre ouvindo, ${nomeSalvo}`;
                    if(reconhecimento) reconhecimento.start();
                }
            };

            sintese.speak(fala);
        }

        // QUANDO ELA ENTENDE O QUE VOCÊ FALOU
        if(reconhecimento) {
            reconhecimento.onresult = (event) => {
                botaoBola.classList.remove('ouvindo');
                // PEGA O QUE VOCÊ FALOU, CERTO, SEM ERRO
                const oQueFalou = event.results[0][0].transcript.trim();
                
                status.textContent = "✅ Entendi: " + oQueFalou; // MOSTRA NA TELA O QUE ELA ENTENDEU

                if(!oQueFalou) {
                    textoInfo.textContent = "Não entendi, fala de novo...";
                    reconhecimento.start();
                    return;
                }

                // === AQUI É A PARTE PRINCIPAL: SALVAR O NOME ===
                if(etapa === 1) {
                    nomeSalvo = oQueFalou; // SALVA O NOME
                    etapa = 2; // MUDA A ETAPA
                    
                    // ELA RESPONDE CHAMANDO VOCÊ PELO NOME
                    falar(`Prazer em te conhecer, ${nomeSalvo}! Agora eu nunca mais esqueço o seu nome. Pode falar o que quiser agora.`);
                } 
                else {
                    // DEPOIS DO NOME, RESPONDE QUALQUER COISA
                    const respostas = [
                        `Entendi tudo, ${nomeSalvo}!`,
                        `Que legal, ${nomeSalvo}!`,
                        `Claro que sim, ${nomeSalvo}!`,
                        `Tudo bem, ${nomeSalvo}!`,
                        `Estou aqui, ${nomeSalvo}!`
                    ];
                    const escolhida = respostas[Math.floor(Math.random() * respostas.length)];
                    falar(escolhida);
                }
            };

            // SE DER ERRO OU NÃO ENTENDER
            reconhecimento.onerror = (erro) => {
                botaoBola.classList.remove('ouvindo');
                textoInfo.textContent = "❌ Erro ou não ouvi bem, fala de novo...";
                if(etapa === 1) reconhecimento.start();
            };

            // QUANDO VOCÊ COMEÇA A FALAR, BOLA MUDA DE COR
            reconhecimento.onspeechstart = () => {
                botaoBola.classList.add('ouvindo');
                status.textContent = "👂 OUVINDO VOCÊ...";
                textoInfo.textContent = "...";
            };

            // SE PARAR DE OUVIR, LIGA DE NOVO
            reconhecimento.onend = () => {
                if(iniciado && etapa !== 1) reconhecimento.start();
            };
        }

        // PRIMEIRO CLIQUE: ELA FALA "QUAL É O SEU NOME?"
        botaoBola.onclick = () => {
            if(!iniciado) {
                iniciado = true;
                falar("Olá! Eu estou aqui. Qual é o seu nome?");
            }
        };

    </script>
</body>
</html>
