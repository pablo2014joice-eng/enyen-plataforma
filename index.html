<head>
    <meta charset="UTF-8">

    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root {
            --primary: #00a884; 
            --dark-blue: #1c2b33;
            --light-bg: #f0f4f8;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            padding-bottom: 90px;
            color: var(--dark-blue);
            overflow-x: hidden;
        }

        .header {

        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;

        .logo-svg {
            width: 35px;

        }

        .brand-name {
            font-size: 22px;

            color: #333;
        }

        .container {
            padding: 15px;
            max-width: 500px;
            margin: auto;
        }

        /* Scanner Box */
        .scanner-section {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            height: 280px;
            box-shadow: var(--shadow);
            margin-bottom: 15px;
            border: 2px solid #ddd;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scanner-target {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 75%;

            border-radius: 12px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            box-shadow: 0 0 15px var(--primary);
            position: absolute;
            animation: moveScan 3s infinite linear;
        }

        @keyframes moveScan {
            0% { top: 0; }
            50% { top: 100%; }

        }

            bottom: 0;

    </style>
</head>
<body>

<div class="header">
    <div class="logo-wrapper">
        <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 5 L85 20 V45 C85 70 50 90 50 90 C 50 90 15 70 15 45 V20 L50 5Z" fill="#00a884"/>
            <path d="M35 40 H65 V48 H45 V55 H60 V63 H45 V70 H65 V78 H35 V40Z" fill="white" />
        </svg>
        <span class="brand-name">Enyen</span>
    </div>
</div>

<div class="container">
    <button class="btn-action btn-cam-trigger" onclick="initScanner()">LIGAR CÂMERA DO SCANNER</button>

    <div class="scanner-section">
        <video id="video"></video>
        <div class="scanner-target">
            <div class="scan-line"></div>
        </div>
        <div class="status-bar" id="status">Aguardando ativação...</div>
    </div>

    <div class="card">
        <h3 class="card-title" id="form-label">Cadastrar Produto</h3>
        <input type="hidden" id="edit-id" value="">
        
        <label>CÓDIGO EAN</label>
        <input type="text" id="ean" placeholder="Aproxime o código da câmera...">

        <label>NOME / MARCA</label>
        <input type="text" id="name" placeholder="Ex: Arroz Tio João">

        <label>PREÇO (R$)</label>
        <input type="number" step="0.01" id="price" placeholder="0.00">

        <button class="btn-action" id="btn-save" onclick="handleSave()">SALVAR NA LISTA</button>
        <button id="btn-cancel" style="display:none; background:#ccc; margin-top:5px;" class="btn-action" onclick="resetForm()">CANCELAR</button>
    </div>

    <div id="list"></div>
</div>

<div class="nav-bar">
    <small style="color:var(--primary); font-weight:bold">SCANNER</small>
    <small style="color:#aaa" onclick="alert('Em breve!')">HISTÓRICO</small>
    <small style="color:#aaa">PERFIL</small>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('enyen_v3')) || [];
    const codeReader = new ZXing.BrowserMultiFormatReader();
    let isLive = false;

    // Função Principal para Iniciar Câmera
    async function initScanner() {
        if(isLive) return;
        
        const status = document.getElementById('status');
        status.innerText = "Solicitando permissão...";

        try {
            const devices = await codeReader.listVideoInputDevices();
            
            // Filtra câmera traseira
            const backCamera = devices.find(d => 
                d.label.toLowerCase().includes('back') || 
                d.label.toLowerCase().includes('traseira') ||
                d.label.toLowerCase().includes('environment')
            );

            const deviceId = backCamera ? backCamera.deviceId : (devices[0] ? devices[0].deviceId : null);

            if (!deviceId) {
                status.innerText = "ERRO: Nenhuma câmera detectada.";
                return;
            }

            isLive = true;
            status.innerText = "SCANNER ATIVO - Foque no código";

            // Inicia decodificação com restrições de vídeo para melhor foco no mobile
            codeReader.decodeFromVideoDevice(deviceId, 'video', (result, err) => {
                if (result) {
                    document.getElementById('ean').value = result.text;
                    status.innerText = "LIDO COM SUCESSO!";
                    if(navigator.vibrate) navigator.vibrate(200);
                }
                if (err && !(err instanceof ZXing.NotFoundException)) {
                    console.error(err);
                }
            });

        } catch (e) {
            status.innerText = "ERRO: Permissão negada ou câmera em uso.";
            alert("Por favor, autorize o uso da câmera nas configurações do seu navegador.");
        }
    }

    function handleSave() {
        const ean = document.getElementById('ean').value;
        const name = document.getElementById('name').value;
        const price = document.getElementById('price').value;
        const editId = document.getElementById('edit-id').value;

        if(!name || !price) return alert("Preencha o nome e o preço!");

        const obj = { ean, name, price: parseFloat(price).toFixed(2) };

        if(editId === "") {
            products.unshift(obj);
        } else {
            products[editId] = obj;
            resetForm();
        }

        localStorage.setItem('enyen_v3', JSON.stringify(products));
        clearInputs();
        render();
    }

    function render() {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '<h3 style="margin-left:5px">Minha Lista</h3>';
        
        products.forEach((p, i) => {
            listDiv.innerHTML += `
                <div class="product-item">
                    <div class="prod-data">
                        <b>${p.name}</b>
                        <span>R$ ${p.price}</span>
                        <small style="display:block; font-size:10px; color:#999">EAN: ${p.ean || 'Manual'}</small>
                    </div>
                    <div class="actions">
                        <button class="btn-icon" style="background:#ffa000" onclick="edit(${i})">✎</button>
                        <button class="btn-icon" style="background:#f44336" onclick="del(${i})">✕</button>
                    </div>
                </div>
            `;
        });
    }

    function edit(i) {
        const p = products[i];
        document.getElementById('ean').value = p.ean;
        document.getElementById('name').value = p.name;
        document.getElementById('price').value = p.price;
        document.getElementById('edit-id').value = i;
        document.getElementById('form-label').innerText = "Editando Produto";
        document.getElementById('btn-save').innerText = "SALVAR ALTERAÇÕES";
        document.getElementById('btn-cancel').style.display = "block";
        window.scrollTo({top: 400, behavior: 'smooth'});
    }

    function del(i) {
        if(confirm("Excluir item?")) {
            products.splice(i, 1);
            localStorage.setItem('enyen_v3', JSON.stringify(products));
            render();
        }
    }

    function resetForm() {
        document.getElementById('edit-id').value = "";
        document.getElementById('form-label').innerText = "Cadastrar Produto";
        document.getElementById('btn-save').innerText = "SALVAR NA LISTA";
        document.getElementById('btn-cancel').style.display = "none";
        clearInputs();
    }

    function clearInputs() {
        document.getElementById('ean').value = "";
        document.getElementById('name').value = "";
        document.getElementById('price').value = "";
    }

    window.onload = render;
</script>

</body>
</html>
